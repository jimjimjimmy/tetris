<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DRIFT - Pattern Sampler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; height: 100dvh; }
    body {
      width: 100%; height: 100%; height: 100dvh;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: monospace;
    }
    #frame {
      position: relative;
      transform-origin: top center;
      background: #0a0a0a;
      overflow: hidden;
      flex-shrink: 0;
    }
    #debug {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      padding: 10px 12px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.65);
      font-size: 9px;
      letter-spacing: 0.5px;
      line-height: 1.7;
      white-space: pre;
      z-index: 200;
      transition: opacity 0.15s;
      min-width: 200px;
    }
    #debug.hidden { opacity: 0; pointer-events: none; }
    #dbg-toggle {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="frame"><canvas id="canvas"></canvas></div>
  <div id="debug" class="hidden"></div>
  <div id="dbg-toggle">[ debug ]</div>

<script>
// ================================================================
//  CONSTANTS -- tweak BPM freely
// ================================================================
const BPM           = 120;
const BEAT_MS       = 60000 / BPM;
const BEATS_PER_BAR = 4;

// Board geometry (matches index.html exactly)
const CELL          = 20;
const COLS          = 10;
const FRAME_W       = 402;
const PLAY_X        = 61;
const PLAY_W        = COLS * CELL;   // 200

// Frame: 35 rows. Origin midline at row 17.5 = y 350 = FRAME_H / 2.
// 4 lanes above origin (rows 3,7,11,15) + 4 below (rows 19,23,27,31).
const FRAME_ROWS    = 35;
const FRAME_H       = FRAME_ROWS * CELL;  // 700
const ORIGIN_Y      = FRAME_H / 2;        // 350

// Colors
const GRID_COLOR    = "rgba(255,255,255,0.06)";

// ================================================================
//  PATTERN LANE DEFINITIONS
// ================================================================
const LANES = [
  { name: "PULSE",      type: "pulse",        row: 3  },
  { name: "TRAV BRIGHT",type: "trav-bright",  row: 7  },
  { name: "GAP TRAVEL", type: "gap-travel",   row: 11 },
  { name: "DOT CRAWL",  type: "dot-crawl",    row: 15 },
  { name: "CORNER",     type: "corner-flash", row: 19 },
  { name: "FILL STEP",  type: "fill-step",    row: 23 },
  { name: "WIPE",       type: "wipe",         row: 27 },
  { name: "INVERSE",    type: "inverse",      row: 31 },
];
const LANE_BY_ROW = new Map(LANES.map(l => [l.row, l]));

// ================================================================
//  FRAME + SCALE
// ================================================================
const frame = document.getElementById("frame");
frame.style.width  = FRAME_W + "px";
frame.style.height = FRAME_H + "px";

function applyScale() {
  const s = Math.min(window.innerWidth / FRAME_W, window.innerHeight / FRAME_H);
  frame.style.transform = "scale(" + s + ")";
}
applyScale();
window.addEventListener("resize", applyScale);

// ================================================================
//  CANVAS
// ================================================================
const canvas = document.getElementById("canvas");
canvas.width  = FRAME_W;
canvas.height = FRAME_H;
canvas.style.cssText = "position:absolute;inset:0;";
const ctx = canvas.getContext("2d");

// ================================================================
//  BEAT STATE (global, shared by all lanes)
// ================================================================
let beatCount = 0;
let beatInBar = 0;  // 0=beat1 ... 3=beat4 (accent)
let stepPos   = 0;  // 0..COLS-1, advances every beat

// Derived helpers (recomputed each draw)
let accent = false;

// ================================================================
//  DRAW: PATTERN FILLS (rendered UNDER grid lines)
// ================================================================

function drawPatternFills() {
  LANES.forEach(lane => {
    const y = lane.row * CELL;

    switch (lane.type) {

      case "pulse":
        // Entire row pulses -- dim on beats 1-3, bright flash on beat 4
        ctx.fillStyle = accent
          ? "rgba(255,255,255,0.18)"
          : "rgba(255,255,255,0.02)";
        ctx.fillRect(PLAY_X, y, PLAY_W, CELL);
        break;

      case "trav-bright":
        // One bright cell travels L-to-R. Beat 4: wider glow, higher alpha.
        if (accent) {
          if (stepPos > 0) {
            ctx.fillStyle = "rgba(255,255,255,0.08)";
            ctx.fillRect(PLAY_X + (stepPos - 1) * CELL, y, CELL, CELL);
          }
          ctx.fillStyle = "rgba(255,255,255,0.28)";
          ctx.fillRect(PLAY_X + stepPos * CELL, y, CELL, CELL);
          if (stepPos < COLS - 1) {
            ctx.fillStyle = "rgba(255,255,255,0.08)";
            ctx.fillRect(PLAY_X + (stepPos + 1) * CELL, y, CELL, CELL);
          }
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fillRect(PLAY_X + stepPos * CELL, y, CELL, CELL);
        }
        break;

      case "gap-travel":
        // Gap handled in drawBaseGrid (omits one interior line).
        // Add faint row tint on beat 4 so the effect is easier to read.
        if (accent) {
          ctx.fillStyle = "rgba(255,255,255,0.05)";
          ctx.fillRect(PLAY_X, y, PLAY_W, CELL);
        }
        break;

      case "fill-step": {
        // Cells fill progressively each beat; full row on beat 4.
        const counts = [2, 5, 8, COLS];
        ctx.fillStyle = accent
          ? "rgba(255,255,255,0.18)"
          : "rgba(255,255,255,0.07)";
        ctx.fillRect(PLAY_X, y, counts[beatInBar] * CELL, CELL);
        break;
      }

      case "wipe": {
        // Highlight sweeps L-to-R across the bar; full row on beat 4.
        const progress = (beatInBar + 1) / BEATS_PER_BAR;
        ctx.fillStyle = accent
          ? "rgba(255,255,255,0.18)"
          : "rgba(255,255,255,0.06)";
        ctx.fillRect(PLAY_X, y, Math.round(progress * PLAY_W), CELL);
        break;
      }

      case "inverse":
        // Row briefly "inverts" (lightens sharply) on beat 4.
        ctx.fillStyle = accent
          ? "rgba(255,255,255,0.22)"
          : "rgba(255,255,255,0.02)";
        ctx.fillRect(PLAY_X, y, PLAY_W, CELL);
        break;
    }
  });
}

// ================================================================
//  DRAW: BASE GRID (on top of fills)
// ================================================================

function drawBaseGrid() {
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth   = 1;
  ctx.beginPath();

  // Horizontal lines -- full width, every row
  for (let r = 0; r <= FRAME_ROWS; r++) {
    ctx.moveTo(0,       r * CELL + 0.5);
    ctx.lineTo(FRAME_W, r * CELL + 0.5);
  }

  // Vertical lines outside play area (global CELL-grid)
  for (let x = 0; x <= FRAME_W; x += CELL) {
    if (x > PLAY_X && x < PLAY_X + PLAY_W) continue;
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, FRAME_H);
  }

  // Play area left/right boundaries (full height, always present)
  ctx.moveTo(PLAY_X          + 0.5, 0);
  ctx.lineTo(PLAY_X          + 0.5, FRAME_H);
  ctx.moveTo(PLAY_X + PLAY_W + 0.5, 0);
  ctx.lineTo(PLAY_X + PLAY_W + 0.5, FRAME_H);

  // Interior column lines (per-row). gap-travel rows omit one line.
  for (let r = 0; r < FRAME_ROWS; r++) {
    const y1   = r * CELL + 0.5;
    const y2   = (r + 1) * CELL + 0.5;
    const lane = LANE_BY_ROW.get(r);
    // gapC: column line to omit (1..COLS-1). -1 = none.
    const gapC = (lane && lane.type === "gap-travel" && stepPos + 1 < COLS)
      ? stepPos + 1
      : -1;

    for (let c = 1; c < COLS; c++) {
      if (c === gapC) continue;
      ctx.moveTo(PLAY_X + c * CELL + 0.5, y1);
      ctx.lineTo(PLAY_X + c * CELL + 0.5, y2);
    }
  }

  ctx.stroke();
}

// ================================================================
//  DRAW: PATTERN OVERLAYS (on top of grid lines)
// ================================================================

function drawPatternOverlays() {
  LANES.forEach(lane => {
    const y = lane.row * CELL;

    switch (lane.type) {

      case "pulse":
        // Beat 4: bright horizontal borders for this row
        if (accent) {
          ctx.strokeStyle = "rgba(255,255,255,0.42)";
          ctx.lineWidth   = 1;
          ctx.beginPath();
          ctx.moveTo(PLAY_X, y + 0.5);
          ctx.lineTo(PLAY_X + PLAY_W, y + 0.5);
          ctx.moveTo(PLAY_X, y + CELL + 0.5);
          ctx.lineTo(PLAY_X + PLAY_W, y + CELL + 0.5);
          ctx.stroke();
        }
        break;

      case "dot-crawl": {
        // Small square dot at cell intersection, travels L-to-R.
        // Beat 4: larger and brighter.
        const alpha = accent ? 0.90 : 0.28;
        const sz    = accent ? 3 : 2;
        const half  = Math.floor(sz / 2);
        const dx    = PLAY_X + stepPos * CELL - half;
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fillRect(dx, y - half,        sz, sz);  // top intersection
        ctx.fillRect(dx, y + CELL - half, sz, sz);  // bottom intersection
        break;
      }

      case "corner-flash": {
        // 4 corner brackets on current cell, travels L-to-R.
        // Beat 4: larger and brighter.
        const alpha = accent ? 0.90 : 0.28;
        const cs    = accent ? 4 : 2;
        const x1    = PLAY_X + stepPos * CELL;
        const y1    = y;
        const x2    = x1 + CELL;
        const y2    = y1 + CELL;
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fillRect(x1,      y1,      cs, cs);
        ctx.fillRect(x2 - cs, y1,      cs, cs);
        ctx.fillRect(x1,      y2 - cs, cs, cs);
        ctx.fillRect(x2 - cs, y2 - cs, cs, cs);
        break;
      }
    }
  });
}

// ================================================================
//  DRAW: LABELS
// ================================================================

function drawLabels() {
  ctx.font         = "bold 7px monospace";
  ctx.textAlign    = "right";
  ctx.textBaseline = "middle";

  LANES.forEach(lane => {
    ctx.fillStyle = accent
      ? "rgba(255,255,255,0.36)"
      : "rgba(255,255,255,0.22)";
    ctx.fillText(lane.name, PLAY_X - 4, lane.row * CELL + CELL / 2);
  });
}

// ================================================================
//  DRAW: BEAT INDICATOR (4 pips near top center)
// ================================================================

function drawBeatIndicator() {
  const pipW   = 5;
  const pipH   = 2;
  const pipGap = 5;
  const totalW = BEATS_PER_BAR * pipW + (BEATS_PER_BAR - 1) * pipGap;
  const sx     = Math.round((FRAME_W - totalW) / 2);
  const sy     = 7;

  for (let i = 0; i < BEATS_PER_BAR; i++) {
    const isNow    = i === beatInBar;
    const isAccent = i === BEATS_PER_BAR - 1;
    ctx.fillStyle  = isNow
      ? (isAccent ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.55)")
      : "rgba(255,255,255,0.10)";
    ctx.fillRect(sx + i * (pipW + pipGap), sy, pipW, pipH);
  }
}

// ================================================================
//  DRAW: MAIN
// ================================================================

function drawFrame() {
  ctx.clearRect(0, 0, FRAME_W, FRAME_H);

  accent = beatInBar === BEATS_PER_BAR - 1;

  drawPatternFills();    // fills first -- under grid
  drawBaseGrid();        // grid on top of fills
  drawPatternOverlays(); // dots/corners on top of grid
  drawLabels();
  drawBeatIndicator();

  // Origin midline (topmost layer)
  ctx.strokeStyle = "rgba(255,255,255,0.50)";
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(PLAY_X, ORIGIN_Y + 0.5);
  ctx.lineTo(PLAY_X + PLAY_W, ORIGIN_Y + 0.5);
  ctx.stroke();
}

// ================================================================
//  BEAT CLOCK
// ================================================================

let lastBeatTime = performance.now();

function onBeat() {
  beatCount++;
  beatInBar = (beatCount - 1) % BEATS_PER_BAR;
  stepPos   = (beatCount - 1) % COLS;
  drawFrame();
  if (debugVisible) renderDebug();
}

function tick(now) {
  if (now - lastBeatTime >= BEAT_MS) {
    lastBeatTime += BEAT_MS;
    onBeat();
  }
  requestAnimationFrame(tick);
}

drawFrame();
requestAnimationFrame(tick);

// ================================================================
//  DEBUG OVERLAY
// ================================================================

const debugEl    = document.getElementById("debug");
let debugVisible = false;

function toggleDebug() {
  debugVisible = !debugVisible;
  debugEl.classList.toggle("hidden", !debugVisible);
  if (debugVisible) renderDebug();
}

function renderDebug() {
  debugEl.textContent = [
    "BPM          " + BPM,
    "BEAT MS      " + BEAT_MS.toFixed(0) + "ms",
    "BEAT #       " + beatCount,
    "BEAT IN BAR  " + (beatInBar + 1) + " / " + BEATS_PER_BAR,
    "STEP POS     col " + stepPos,
    "ACCENT       " + (accent ? "YES - beat 4" : "no"),
    "BAR #        " + Math.ceil(beatCount / BEATS_PER_BAR),
    "",
    "LANE         ROW   Y",
    "----------   ---   ----",
    ...LANES.map(l =>
      l.name.padEnd(12) + " " +
      String(l.row).padStart(3) + "   " +
      String(l.row * CELL) + "px"
    ),
  ].join("\n");
}

document.getElementById("dbg-toggle")
  .addEventListener("pointerdown", toggleDebug);
document.addEventListener("keydown", e => {
  if (e.key === "d" || e.key === "D") toggleDebug();
});
</script>
</body>
</html>
