<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DRIFT - Lane Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; height: 100dvh; }
    body {
      width: 100%; height: 100%; height: 100dvh;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: monospace;
    }

    #frame {
      position: relative;
      transform-origin: top center;
      background: #0a0a0a;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* origin line sits above canvas */
    #origin-line {
      position: absolute;
      height: 2px;
      background: rgba(255, 255, 255, 0.65);
      pointer-events: none;
      z-index: 2;
    }

    #debug {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.65);
      font-size: 9px;
      letter-spacing: 0.5px;
      line-height: 1.7;
      white-space: pre;
      z-index: 200;
      transition: opacity 0.15s;
      min-width: 200px;
    }
    #debug.hidden { opacity: 0; pointer-events: none; }

    #dbg-toggle {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="canvas"></canvas>
    <div id="origin-line"></div>
  </div>
  <div id="debug" class="hidden"></div>
  <div id="dbg-toggle">[ debug ]</div>

<script>
// ================================================================
//  CONSTANTS -- tweak here, nowhere else
// ================================================================

const BPM           = 120;
const BEAT_MS       = 60000 / BPM;   // 500ms at 120bpm

// Board geometry (mirrors index.html exactly)
const CELL          = 20;
const COLS          = 10;
const ROWS_2P       = 44;
const BDY_2P        = ROWS_2P / 2;   // 22
const FRAME_W       = 402;
const GAME_2P_H     = ROWS_2P * CELL; // 880
const PLAY_X        = 61;
const PLAY_W        = COLS * CELL;    // 200
const PLAY_Y        = 0;

// Lane layout
const LANE_INTERVAL = 4;
const MIN_EDGE_GAP  = 2;

// Grid
// GRID_COLOR slightly brighter than the original (0.04) so the traveling
// gap is perceptible -- the gap IS the visual, there are no fills.
const GRID_COLOR    = "rgba(255,255,255,0.07)";

// ================================================================
//  LANE DATA
// ================================================================
//
//  The "drift" effect is expressed purely through the grid lines.
//  Each drift lane has an `offset` (0..COLS-1). On each beat step,
//  offset advances by dir, cycling with period = COLS.
//
//  In drawGrid(), the interior column line at position `offset` is
//  OMITTED for that row, making two adjacent cells appear double-wide
//  (a "fault"). The fault travels one column per beat in direction dir.
//
//  When offset = 0 the row looks identical to a non-drift row.
//
//  P1 lanes (below origin): dir = +1 (fault travels right)
//  P2 lanes (above origin): dir = -1 (fault travels left)
//  This creates outward symmetry from the center.

function buildLanes() {
  const lanes = [];
  let idx = 0;
  for (
    let dist = LANE_INTERVAL;
    BDY_2P + dist + MIN_EDGE_GAP < ROWS_2P && BDY_2P - dist - MIN_EDGE_GAP >= 0;
    dist += LANE_INTERVAL
  ) {
    idx++;
    const dir = idx % 2 === 1 ? 1 : -1;
    lanes.push({
      id: "p1-" + idx, row: BDY_2P + dist, dist, side: 1,
      dir, index: idx,
      offset: 0, beatAccum: 0, beatsPerStep: 1,
      period: COLS,  // fault cycles through all COLS column positions
    });
    lanes.push({
      id: "p2-" + idx, row: BDY_2P - dist, dist, side: 2,
      dir: -dir, index: idx,
      offset: 0, beatAccum: 0, beatsPerStep: 1,
      period: COLS,
    });
  }
  return lanes;
}

const LANES    = buildLanes();
const LANE_MAP = new Map(LANES.map(l => [l.row, l]));

// ================================================================
//  FRAME + SCALE
// ================================================================

const frame = document.getElementById("frame");
frame.style.width  = FRAME_W   + "px";
frame.style.height = GAME_2P_H + "px";

function applyScale() {
  const s = Math.min(window.innerWidth / FRAME_W, window.innerHeight / GAME_2P_H);
  frame.style.transform = "scale(" + s + ")";
}
applyScale();
window.addEventListener("resize", applyScale);

// ================================================================
//  CANVAS
// ================================================================

const canvas = document.getElementById("canvas");
canvas.width  = FRAME_W;
canvas.height = GAME_2P_H;
canvas.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:1;";
const ctx = canvas.getContext("2d");

// ================================================================
//  ORIGIN LINE
// ================================================================

const originLine = document.getElementById("origin-line");
originLine.style.left  = PLAY_X + "px";
originLine.style.width = PLAY_W  + "px";
originLine.style.top   = (PLAY_Y + BDY_2P * CELL) + "px";

// ================================================================
//  DRAW
// ================================================================
//
//  The grid IS the visual -- no cell fills, no overlaid layers.
//
//  Drift rows look exactly like non-drift rows when offset=0.
//  When offset=1..COLS-1, one interior vertical line segment is
//  absent in that row, creating a double-wide "fault" cell that
//  travels one column per beat.
//
//  Column grid inside play area is PLAY_X-aligned so cell boundaries
//  match exactly. Outside play area uses the global CELL-grid.

function drawGrid() {
  ctx.clearRect(0, 0, FRAME_W, GAME_2P_H);
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth   = 1;
  ctx.beginPath();

  // --- horizontal lines: full width, every row ---
  for (let r = 0; r <= ROWS_2P; r++) {
    ctx.moveTo(0,       r * CELL + 0.5);
    ctx.lineTo(FRAME_W, r * CELL + 0.5);
  }

  // --- vertical lines outside play area: global CELL-grid ---
  for (let x = 0; x <= FRAME_W; x += CELL) {
    if (x > PLAY_X && x < PLAY_X + PLAY_W) continue;
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, GAME_2P_H);
  }

  // --- play area left/right boundaries: always present, full height ---
  ctx.moveTo(PLAY_X          + 0.5, 0);
  ctx.lineTo(PLAY_X          + 0.5, GAME_2P_H);
  ctx.moveTo(PLAY_X + PLAY_W + 0.5, 0);
  ctx.lineTo(PLAY_X + PLAY_W + 0.5, GAME_2P_H);

  // --- interior column lines inside play area: per-row with drift gap ---
  //
  //  For each row, draw interior lines at PLAY_X + c*CELL for c=1..COLS-1.
  //  For drift rows: skip the line at c = lane.offset (the traveling fault).
  //  When lane.offset = 0, no line is skipped (row looks normal).
  for (let r = 0; r < ROWS_2P; r++) {
    const y1 = r * CELL + 0.5;
    const y2 = (r + 1) * CELL + 0.5;
    const lane    = LANE_MAP.get(r);
    const gapCol  = lane ? lane.offset : 0; // 0 means no gap

    for (let c = 1; c < COLS; c++) {
      if (c === gapCol) continue;           // fault: omit this line
      const x = PLAY_X + c * CELL + 0.5;
      ctx.moveTo(x, y1);
      ctx.lineTo(x, y2);
    }
  }

  ctx.stroke();
}

// ================================================================
//  BEAT CLOCK
// ================================================================

let beatCount    = 0;
let lastBeatTime = performance.now();

function onBeat() {
  beatCount++;
  LANES.forEach(lane => {
    lane.beatAccum++;
    if (lane.beatAccum >= lane.beatsPerStep) {
      lane.beatAccum = 0;
      lane.offset = ((lane.offset + lane.dir) % lane.period + lane.period) % lane.period;
    }
  });
  drawGrid();
  if (debugVisible) renderDebug();
}

function tick(now) {
  if (now - lastBeatTime >= BEAT_MS) {
    lastBeatTime += BEAT_MS;
    onBeat();
  }
  requestAnimationFrame(tick);
}

drawGrid();
requestAnimationFrame(tick);

// ================================================================
//  DEBUG OVERLAY
// ================================================================

const debugEl    = document.getElementById("debug");
let debugVisible = false;

function toggleDebug() {
  debugVisible = !debugVisible;
  debugEl.classList.toggle("hidden", !debugVisible);
  if (debugVisible) renderDebug();
}

function renderDebug() {
  const header = [
    "BPM       " + BPM,
    "BEAT MS   " + BEAT_MS.toFixed(0) + "ms",
    "BEAT #    " + beatCount,
    "CELL      " + CELL + "px",
    "FAULT     traveling gap (1 line/beat)",
    "PERIOD    " + COLS + " beats",
    "ORIGIN    row " + BDY_2P + "  y=" + (BDY_2P * CELL) + "px",
    "LANES     " + LANES.length,
    "",
    "IDX  SIDE  ROW  DIST  DIR  OFF  GAP",
    "---  ----  ---  ----  ---  ---  ---",
  ];
  const rows = LANES
    .slice()
    .sort((a, b) => a.row - b.row)
    .map(l => {
      const gapStr = l.offset === 0 ? "none" : "col " + l.offset;
      return (
        " " + l.index +
        "    P" + l.side +
        "    " + String(l.row).padStart(2, " ") +
        "    +" + l.dist +
        "   " + (l.dir > 0 ? " ->" : "<- ") +
        "   " + l.offset +
        "  " + gapStr
      );
    });
  debugEl.textContent = header.concat(rows).join("\n");
}

document.getElementById("dbg-toggle")
  .addEventListener("pointerdown", toggleDebug);
document.addEventListener("keydown", e => {
  if (e.key === "d" || e.key === "D") toggleDebug();
});
</script>
</body>
</html>
