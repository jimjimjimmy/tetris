<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DRIFT - Pattern Sampler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; height: 100dvh; }
    body {
      width: 100%; height: 100%; height: 100dvh;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: monospace;
    }
    #frame {
      position: relative;
      transform-origin: top center;
      background: #0a0a0a;
      overflow: hidden;
      flex-shrink: 0;
    }
    #debug {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      padding: 10px 12px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.65);
      font-size: 9px;
      letter-spacing: 0.5px;
      line-height: 1.7;
      white-space: pre;
      z-index: 200;
      transition: opacity 0.15s;
      min-width: 200px;
    }
    #debug.hidden { opacity: 0; pointer-events: none; }
    #dbg-toggle {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="frame"><canvas id="canvas"></canvas></div>
  <div id="debug" class="hidden"></div>
  <div id="dbg-toggle">[ debug ]</div>

<script>
// ================================================================
//  CONSTANTS -- tweak BPM freely
// ================================================================
const BPM           = 120;
const BEAT_MS       = 60000 / BPM;
const BEATS_PER_BAR = 4;

// Board geometry (matches index.html)
const CELL          = 20;
const COLS          = 10;
const FRAME_W       = 402;
const PLAY_X        = 61;
const PLAY_W        = COLS * CELL;   // 200

// Frame: 5 lanes at rows 3, 8, 13, 18, 23. 26 rows total.
// ORIGIN_Y divides the reference group (lanes 1-2) from focused patterns (3-5).
// Placed in the 4-row gap between row 8 (ref) and row 13 (focused): y=220.
const FRAME_ROWS    = 26;
const FRAME_H       = FRAME_ROWS * CELL;  // 520
const ORIGIN_Y      = 220;               // between ref and focused groups

const GRID_COLOR    = "rgba(255,255,255,0.06)";

// ================================================================
//  LANE DEFINITIONS
// ================================================================
//
//  Each lane carries:
//    row          - grid row for this lane
//    type         - drawing mode
//    dir          - +1 (right) or -1 (left): travel direction
//    pos          - current lead position (0..COLS-1), updated each beat
//
//  Lanes 1-2: reference patterns carried over from previous build
//  Lanes 3-5: focused patterns being evaluated

const LANES = [
  { name: "DOT x1",   type: "dot-1",  row: 3,  dir: +1, pos: 0 },
  { name: "CORNER",   type: "corner", row: 8,  dir: +1, pos: 0 },
  { name: "DOT x2",   type: "dot-2",  row: 13, dir: +1, pos: 0 },
  { name: "ARROW ->", type: "arrow",  row: 18, dir: +1, pos: 0 },
  { name: "ARROW <-", type: "arrow",  row: 23, dir: -1, pos: 0 },
];
const LANE_BY_ROW = new Map(LANES.map(l => [l.row, l]));

// ================================================================
//  FRAME + SCALE
// ================================================================
const frame = document.getElementById("frame");
frame.style.width  = FRAME_W + "px";
frame.style.height = FRAME_H + "px";

function applyScale() {
  const s = Math.min(window.innerWidth / FRAME_W, window.innerHeight / FRAME_H);
  frame.style.transform = "scale(" + s + ")";
}
applyScale();
window.addEventListener("resize", applyScale);

// ================================================================
//  CANVAS
// ================================================================
const canvas = document.getElementById("canvas");
canvas.width  = FRAME_W;
canvas.height = FRAME_H;
canvas.style.cssText = "position:absolute;inset:0;";
const ctx = canvas.getContext("2d");

// ================================================================
//  BEAT STATE
// ================================================================
let beatCount = 0;
let beatInBar = 0;  // 0=beat1 ... 3=beat4 (accent)
let accent    = false;

// ================================================================
//  DRAW: BASE GRID
// ================================================================

function drawBaseGrid() {
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth   = 1;
  ctx.beginPath();

  // Horizontal lines (full width)
  for (let r = 0; r <= FRAME_ROWS; r++) {
    ctx.moveTo(0,       r * CELL + 0.5);
    ctx.lineTo(FRAME_W, r * CELL + 0.5);
  }

  // Vertical lines outside play area
  for (let x = 0; x <= FRAME_W; x += CELL) {
    if (x > PLAY_X && x < PLAY_X + PLAY_W) continue;
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, FRAME_H);
  }

  // Play area left/right boundaries
  ctx.moveTo(PLAY_X          + 0.5, 0);
  ctx.lineTo(PLAY_X          + 0.5, FRAME_H);
  ctx.moveTo(PLAY_X + PLAY_W + 0.5, 0);
  ctx.lineTo(PLAY_X + PLAY_W + 0.5, FRAME_H);

  // Interior column lines (uniform for all rows - no gap effects here)
  for (let r = 0; r < FRAME_ROWS; r++) {
    const y1 = r * CELL + 0.5;
    const y2 = (r + 1) * CELL + 0.5;
    for (let c = 1; c < COLS; c++) {
      ctx.moveTo(PLAY_X + c * CELL + 0.5, y1);
      ctx.lineTo(PLAY_X + c * CELL + 0.5, y2);
    }
  }

  ctx.stroke();
}

// ================================================================
//  DRAW: PATTERN OVERLAYS (on top of grid)
// ================================================================

function drawPatternOverlays() {
  LANES.forEach(lane => {
    const y = lane.row * CELL;

    switch (lane.type) {

      case "dot-1": {
        // Single intersection dot, traveling in lane.dir.
        // Drawn at top and bottom edges of the row (where grid lines cross).
        const alpha = accent ? 0.90 : 0.28;
        const sz    = accent ? 3 : 2;
        const half  = Math.floor(sz / 2);
        const dx    = PLAY_X + lane.pos * CELL - half;
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fillRect(dx, y - half,        sz, sz);  // top intersection
        ctx.fillRect(dx, y + CELL - half, sz, sz);  // bottom intersection
        break;
      }

      case "corner": {
        // 4-corner brackets on current cell, traveling in lane.dir.
        const alpha = accent ? 0.90 : 0.28;
        const cs    = accent ? 4 : 2;
        const x1    = PLAY_X + lane.pos * CELL;
        const y1    = y;
        const x2    = x1 + CELL;
        const y2    = y1 + CELL;
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fillRect(x1,      y1,      cs, cs);
        ctx.fillRect(x2 - cs, y1,      cs, cs);
        ctx.fillRect(x1,      y2 - cs, cs, cs);
        ctx.fillRect(x2 - cs, y2 - cs, cs, cs);
        break;
      }

      case "dot-2": {
        // Two intersection dots spaced half the row width apart (5 cells).
        // They travel together, always half-row apart, creating a slow pulse.
        const alpha = accent ? 0.90 : 0.28;
        const sz    = accent ? 3 : 2;
        const half  = Math.floor(sz / 2);
        const cols  = [lane.pos, (lane.pos + 5) % COLS];
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        cols.forEach(col => {
          const dx = PLAY_X + col * CELL - half;
          ctx.fillRect(dx, y - half,        sz, sz);
          ctx.fillRect(dx, y + CELL - half, sz, sz);
        });
        break;
      }

      case "arrow": {
        // Two text arrows pointing in lane.dir, spaced half-row apart.
        // Vertical stagger by column parity (5-col gap = always opposite parity).
        const alpha  = accent ? 0.88 : 0.22;
        const glyph  = lane.dir > 0 ? "→" : "←";
        const cols   = [lane.pos, (lane.pos + 5) % COLS];
        ctx.fillStyle    = "rgba(255,255,255," + alpha + ")";
        ctx.font         = "9px monospace";
        ctx.textAlign    = "center";
        ctx.textBaseline = "middle";
        cols.forEach(col => {
          const cx = PLAY_X + col * CELL + CELL / 2;
          const cy = y + (col % 2 === 0 ? CELL * 0.32 : CELL * 0.68);
          ctx.fillText(glyph, cx, cy);
        });
        break;
      }
    }
  });
}

// ================================================================
//  DRAW: LABELS
// ================================================================

function drawLabels() {
  ctx.font         = "bold 7px monospace";
  ctx.textAlign    = "right";
  ctx.textBaseline = "middle";

  LANES.forEach((lane, i) => {
    // Reference lanes (0-1) slightly dimmer than focused lanes (2-4)
    const isRef   = i < 2;
    ctx.fillStyle = isRef
      ? "rgba(255,255,255,0.16)"
      : "rgba(255,255,255,0.28)";
    ctx.fillText(lane.name, PLAY_X - 4, lane.row * CELL + CELL / 2);
  });

  // "REF" tag for reference lanes
  ctx.fillStyle = "rgba(255,255,255,0.10)";
  ctx.font      = "6px monospace";
  LANES.slice(0, 2).forEach(lane => {
    ctx.fillText("REF", PLAY_X - 4, lane.row * CELL + CELL / 2 + 8);
  });
}

// ================================================================
//  DRAW: BEAT INDICATOR
// ================================================================

function drawBeatIndicator() {
  const pipW   = 5;
  const pipH   = 2;
  const pipGap = 5;
  const totalW = BEATS_PER_BAR * pipW + (BEATS_PER_BAR - 1) * pipGap;
  const sx     = Math.round((FRAME_W - totalW) / 2);
  const sy     = 7;

  for (let i = 0; i < BEATS_PER_BAR; i++) {
    const isNow  = i === beatInBar;
    const isAcc  = i === BEATS_PER_BAR - 1;
    ctx.fillStyle = isNow
      ? (isAcc ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.55)")
      : "rgba(255,255,255,0.10)";
    ctx.fillRect(sx + i * (pipW + pipGap), sy, pipW, pipH);
  }
}

// ================================================================
//  DRAW: MAIN FRAME
// ================================================================

function drawFrame() {
  ctx.clearRect(0, 0, FRAME_W, FRAME_H);

  accent = beatInBar === BEATS_PER_BAR - 1;

  drawBaseGrid();
  drawPatternOverlays();
  drawLabels();
  drawBeatIndicator();

  // Origin divider (between ref group and focused group)
  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(PLAY_X, ORIGIN_Y + 0.5);
  ctx.lineTo(PLAY_X + PLAY_W, ORIGIN_Y + 0.5);
  ctx.stroke();
}

// ================================================================
//  BEAT CLOCK
// ================================================================

let lastBeatTime = performance.now();

function onBeat() {
  beatCount++;
  beatInBar = (beatCount - 1) % BEATS_PER_BAR;

  // Advance each lane's position in its own direction
  LANES.forEach(l => {
    l.pos = ((l.pos + l.dir) % COLS + COLS) % COLS;
  });

  drawFrame();
  if (debugVisible) renderDebug();
}

function tick(now) {
  if (now - lastBeatTime >= BEAT_MS) {
    lastBeatTime += BEAT_MS;
    onBeat();
  }
  requestAnimationFrame(tick);
}

drawFrame();
requestAnimationFrame(tick);

// ================================================================
//  DEBUG OVERLAY
// ================================================================

const debugEl    = document.getElementById("debug");
let debugVisible = false;

function toggleDebug() {
  debugVisible = !debugVisible;
  debugEl.classList.toggle("hidden", !debugVisible);
  if (debugVisible) renderDebug();
}

function renderDebug() {
  debugEl.textContent = [
    "BPM          " + BPM,
    "BEAT MS      " + BEAT_MS.toFixed(0) + "ms",
    "BEAT #       " + beatCount,
    "BEAT IN BAR  " + (beatInBar + 1) + " / " + BEATS_PER_BAR,
    "ACCENT       " + (accent ? "YES" : "no"),
    "BAR #        " + Math.ceil(beatCount / BEATS_PER_BAR),
    "",
    "LANE         DIR  POS",
    "----------   ---  ---",
    ...LANES.map(l =>
      l.name.padEnd(12) + " " +
      (l.dir > 0 ? " +1" : " -1") + "  " +
      l.pos
    ),
  ].join("\n");
}

document.getElementById("dbg-toggle")
  .addEventListener("pointerdown", toggleDebug);
document.addEventListener("keydown", e => {
  if (e.key === "d" || e.key === "D") toggleDebug();
});
</script>
</body>
</html>
