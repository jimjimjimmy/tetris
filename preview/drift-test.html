<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DRIFT - Lane Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; height: 100dvh; }
    body {
      width: 100%; height: 100%; height: 100dvh;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: monospace;
    }

    #frame {
      position: relative;
      transform-origin: top center;
      background: #0a0a0a;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* origin line sits above the canvas */
    #origin-line {
      position: absolute;
      height: 2px;
      background: rgba(255, 255, 255, 0.65);
      pointer-events: none;
      z-index: 2;
    }

    #debug {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.65);
      font-size: 9px;
      letter-spacing: 0.5px;
      line-height: 1.7;
      white-space: pre;
      z-index: 200;
      transition: opacity 0.15s;
      min-width: 200px;
    }
    #debug.hidden { opacity: 0; pointer-events: none; }

    #dbg-toggle {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="canvas"></canvas>
    <div id="origin-line"></div>
  </div>
  <div id="debug" class="hidden"></div>
  <div id="dbg-toggle">[ debug ]</div>

<script>
// ================================================================
//  CONSTANTS -- tweak here, nowhere else
// ================================================================

const BPM           = 120;
const BEAT_MS       = 60000 / BPM;   // ms per beat (500ms at 120bpm)

// Board geometry (mirrors index.html exactly)
const CELL          = 20;
const COLS          = 10;
const ROWS_2P       = 44;
const BDY_2P        = ROWS_2P / 2;   // 22 - boundary row
const FRAME_W       = 402;
const GAME_2P_H     = ROWS_2P * CELL; // 880
const PLAY_X        = 61;
const PLAY_W        = COLS * CELL;    // 200
const PLAY_Y        = 0;

// Lane layout
const LANE_INTERVAL = 4;   // rows between lanes, measured from origin
const MIN_EDGE_GAP  = 2;   // min clear rows between outermost lane and frame edge

// Stripe pattern (in cells, not pixels)
// STRIPE_CELLS out of every STRIPE_PERIOD columns are lit per lane row.
// Tweak these to change visual density.
const STRIPE_PERIOD = 5;   // pattern repeats every N cells
const STRIPE_CELLS  = 1;   // lit cells per period

// Visuals
const LANE_OPACITY  = 0.14;
const GRID_COLOR    = "rgba(255,255,255,0.04)";
const LANE_COLOR    = "rgba(255,255,255," + LANE_OPACITY + ")";

// ================================================================
//  LANE DATA STRUCTURE
// ================================================================
//
//  Each lane is a plain object:
//    row          - grid row (0..ROWS_2P-1)
//    dir          - +1 right, -1 left
//    offset       - current pattern shift in cells (0..period-1)
//    beatsPerStep - beats between each 1-cell shift (1 = every beat)
//    beatAccum    - beats accumulated toward next step
//    period       - stripe repeat length in cells (per-lane, for flexibility)
//    stripeCells  - lit cells per period (per-lane, for flexibility)
//
//  To add vertical column movement later: add a colOffset[] array and a
//  parallel COL_MAP, then extend drawGrid() to check both axes.

function buildLanes() {
  const lanes = [];
  let idx = 0;
  for (
    let dist = LANE_INTERVAL;
    BDY_2P + dist + MIN_EDGE_GAP < ROWS_2P && BDY_2P - dist - MIN_EDGE_GAP >= 0;
    dist += LANE_INTERVAL
  ) {
    idx++;
    const dir = idx % 2 === 1 ? 1 : -1;  // alternating right / left

    // P1 side: rows below origin
    lanes.push({
      id: "p1-" + idx, row: BDY_2P + dist, dist, side: 1,
      dir, index: idx,
      offset: 0, beatAccum: 0, beatsPerStep: 1,
      period: STRIPE_PERIOD, stripeCells: STRIPE_CELLS,
    });

    // P2 side: rows above origin (mirrored direction)
    lanes.push({
      id: "p2-" + idx, row: BDY_2P - dist, dist, side: 2,
      dir: -dir, index: idx,
      offset: 0, beatAccum: 0, beatsPerStep: 1,
      period: STRIPE_PERIOD, stripeCells: STRIPE_CELLS,
    });
  }
  return lanes;
}

const LANES    = buildLanes();
// Row -> lane lookup (O(1)) - useful when per-cell logic needs to know its lane
const LANE_MAP = new Map(LANES.map(l => [l.row, l]));

// ================================================================
//  FRAME + SCALE
// ================================================================

const frame = document.getElementById("frame");
frame.style.width  = FRAME_W   + "px";
frame.style.height = GAME_2P_H + "px";

function applyScale() {
  const s = Math.min(window.innerWidth / FRAME_W, window.innerHeight / GAME_2P_H);
  frame.style.transform = "scale(" + s + ")";
}
applyScale();
window.addEventListener("resize", applyScale);

// ================================================================
//  CANVAS SETUP
// ================================================================

const canvas = document.getElementById("canvas");
canvas.width  = FRAME_W;
canvas.height = GAME_2P_H;
canvas.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:1;";
const ctx = canvas.getContext("2d");

// ================================================================
//  ORIGIN LINE
// ================================================================

const originLine = document.getElementById("origin-line");
originLine.style.left  = PLAY_X + "px";
originLine.style.width = PLAY_W  + "px";
originLine.style.top   = (PLAY_Y + BDY_2P * CELL) + "px";

// ================================================================
//  DRAW
// ================================================================
//  Called once on init, then once per beat.
//  Between beats, the canvas is static -- snap hold snap hold.

function drawGrid() {
  ctx.clearRect(0, 0, FRAME_W, GAME_2P_H);

  // --- grid lines (full frame, same tile origin as original CSS background) ---
  ctx.beginPath();
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth   = 1;
  for (let y = 0; y <= GAME_2P_H; y += CELL) {
    ctx.moveTo(0,       y + 0.5);
    ctx.lineTo(FRAME_W, y + 0.5);
  }
  for (let x = 0; x <= FRAME_W; x += CELL) {
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, GAME_2P_H);
  }
  ctx.stroke();

  // --- drift lane cells ---
  //  A cell at column `col` in a lane is lit when:
  //    ((col - offset) mod period) < stripeCells
  //  This shifts the lit pattern one cell per step as offset increments.
  ctx.fillStyle = LANE_COLOR;
  LANES.forEach(lane => {
    const cellY = PLAY_Y + lane.row * CELL;
    for (let col = 0; col < COLS; col++) {
      const pos = ((col - lane.offset) % lane.period + lane.period) % lane.period;
      if (pos < lane.stripeCells) {
        // 1px inset so fill sits cleanly inside grid lines
        ctx.fillRect(PLAY_X + col * CELL + 1, cellY + 1, CELL - 2, CELL - 2);
      }
    }
  });
}

// ================================================================
//  BEAT CLOCK
// ================================================================
//
//  On every beat:
//    1. Increment each lane's beatAccum.
//    2. When beatAccum reaches beatsPerStep, reset it and shift offset by dir.
//    3. Redraw the grid.
//
//  lastBeatTime uses += BEAT_MS (not = now) to prevent drift accumulation.

let beatCount    = 0;
let lastBeatTime = performance.now();

function onBeat() {
  beatCount++;
  LANES.forEach(lane => {
    lane.beatAccum++;
    if (lane.beatAccum >= lane.beatsPerStep) {
      lane.beatAccum = 0;
      lane.offset = ((lane.offset + lane.dir) % lane.period + lane.period) % lane.period;
    }
  });
  drawGrid();
  if (debugVisible) renderDebug();
}

function tick(now) {
  if (now - lastBeatTime >= BEAT_MS) {
    lastBeatTime += BEAT_MS;
    onBeat();
  }
  requestAnimationFrame(tick);
}

drawGrid();                    // static first frame (no flicker before first beat)
requestAnimationFrame(tick);

// ================================================================
//  DEBUG OVERLAY
// ================================================================

const debugEl    = document.getElementById("debug");
let debugVisible = false;

function toggleDebug() {
  debugVisible = !debugVisible;
  debugEl.classList.toggle("hidden", !debugVisible);
  if (debugVisible) renderDebug();
}

function renderDebug() {
  const header = [
    "BPM       " + BPM,
    "BEAT MS   " + BEAT_MS.toFixed(0) + "ms",
    "BEAT #    " + beatCount,
    "CELL      " + CELL + "px",
    "PERIOD    " + STRIPE_PERIOD + " cells  (" + STRIPE_CELLS + " lit)",
    "ORIGIN    row " + BDY_2P + "  y=" + (BDY_2P * CELL) + "px",
    "LANES     " + LANES.length,
    "",
    "IDX  SIDE  ROW  DIST  DIR  OFF  BPS",
    "---  ----  ---  ----  ---  ---  ---",
  ];
  const rows = LANES
    .slice()
    .sort((a, b) => a.row - b.row)
    .map(l => (
      " " + l.index +
      "    P" + l.side +
      "    " + String(l.row).padStart(2, " ") +
      "    +" + l.dist +
      "   " + (l.dir > 0 ? " ->" : "<- ") +
      "   " + l.offset +
      "    " + l.beatsPerStep
    ));
  debugEl.textContent = header.concat(rows).join("\n");
}

document.getElementById("dbg-toggle")
  .addEventListener("pointerdown", toggleDebug);
document.addEventListener("keydown", e => {
  if (e.key === "d" || e.key === "D") toggleDebug();
});
</script>
</body>
</html>
