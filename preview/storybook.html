<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris — Component Storybook</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; min-width: 220px; background: #1a1a1a; color: #fff;
      padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #888; padding: 0 20px 16px; }
    .sidebar-section { padding: 12px 20px 4px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    .sidebar-item { padding: 8px 20px; font-size: 13px; cursor: pointer;
      color: #aaa; transition: background 0.15s, color 0.15s; }
    .sidebar-item:hover { background: #2a2a2a; color: #fff; }
    .sidebar-item.active { background: #2a2a2a; color: #fff; font-weight: 600; }
    .main { flex: 1; padding: 40px; }
    .component-header { margin-bottom: 8px; }
    .component-title { font-size: 18px; font-weight: 700; }
    .component-desc { font-size: 13px; color: #666; margin-top: 4px; }
    .canvas-wrap {
      display: inline-block; background: #f0e8d8; padding: 20px;
      border-radius: 12px; margin-top: 16px;
    }
    .replay-btn {
      display: inline-block; margin-top: 12px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; border: none; border-radius: 6px;
      background: #1a1a1a; color: #fff; cursor: pointer;
    }
    .replay-btn:hover { background: #333; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Design tokens ───────────────────────────────────────────────────────────
const T = {
  // Fill these in from Figma once the design file is established
  bg:     "#f5f5f5",
  white:  "#ffffff",
  black:  "#1a1a1a",
  gray:   "#999999",
};

// ─── Animation hook ──────────────────────────────────────────────────────────
function useReveal(duration = 800) {
  const [p, setP] = useState(0);
  const start = useRef(null);
  useEffect(() => {
    let raf;
    const tick = (ts) => {
      if (!start.current) start.current = ts;
      const elapsed = ts - start.current;
      const raw = elapsed / duration;
      const eased = 1 - Math.pow(1 - Math.min(raw, 1), 3);
      setP(eased);
      if (raw < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [duration]);
  return p;
}

// ─── Components ──────────────────────────────────────────────────────────────
// Add components here, above SECTIONS.
// Each component is a named function: function MyComponent() { ... }

function Placeholder() {
  return (
    <div style={{
      width: 357, padding: "32px 20px", background: T.white,
      borderRadius: 12, textAlign: "center", color: T.gray, fontSize: 14,
    }}>
      First component goes here
    </div>
  );
}

// ─── Section + component registry ────────────────────────────────────────────
const SECTIONS = [
  {
    section: "Getting Started",
    items: [
      { id: "Placeholder", label: "Placeholder", desc: "Replace with first real component", component: Placeholder },
    ],
  },
];

const ANIMATED_IDS = new Set([
  // Add component IDs here if they have animation (gets a Replay button)
]);

// ─── ComponentCard ────────────────────────────────────────────────────────────
function ComponentCard({ item }) {
  const [key, setKey] = useState(0);
  const Comp = item.component;
  const isAnimated = ANIMATED_IDS.has(item.id);
  return (
    <div style={{ marginBottom: 48 }}>
      <div className="component-header">
        <div className="component-title">{item.label}</div>
        {item.desc && <div className="component-desc">{item.desc}</div>}
      </div>
      <div className="canvas-wrap">
        <Comp key={key} />
      </div>
      {isAnimated && (
        <div>
          <button className="replay-btn" onClick={() => setKey(k => k + 1)}>
            Replay
          </button>
        </div>
      )}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const allItems = SECTIONS.flatMap(s => s.items);
  const [activeId, setActiveId] = useState(allItems[0]?.id);
  const activeItem = allItems.find(i => i.id === activeId);

  return (
    <div className="app">
      <nav className="sidebar">
        <div className="sidebar-title">Tetris</div>
        {SECTIONS.map(s => (
          <div key={s.section}>
            <div className="sidebar-section">{s.section}</div>
            {s.items.map(item => (
              <div
                key={item.id}
                className={`sidebar-item${activeId === item.id ? " active" : ""}`}
                onClick={() => setActiveId(item.id)}
              >
                {item.label}
              </div>
            ))}
          </div>
        ))}
      </nav>
      <main className="main">
        {activeItem && <ComponentCard item={activeItem} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
