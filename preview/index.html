<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Tetris</title>
  <link href="vendor/inter.css" rel="stylesheet" />
  <!-- Vendored production React (local, no CDN). App JS is PRE-COMPILED:
       edit preview/app.jsx then run `npm run build` -> preview/app.js. No
       Babel at runtime, no network at launch, works offline. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      /* 100% on iOS Safari = layout viewport (excludes the dynamic browser
         chrome / home-indicator zone), leaving a visible black bar at the
         bottom. 100dvh = dynamic viewport height, which expands/contracts
         as Safari UI shows/hides and includes the safe-area below. The
         100vh fallback comes first for browsers without dvh support. */
      height: 100vh;
      height: 100dvh;
      min-height: 100dvh;
      background: #0a0a0a;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      font-family: monospace;
    }
    /* True edge-to-edge: no body padding, #root fills the entire viewport
       including under the notch and home indicator. The game wrapper
       scales to fit HEIGHT, so the canvas runs to the physical screen
       edges vertically. Background extends behind the iOS home indicator
       zone via 100dvh + safe-area-inset-bottom on the root. */
    body {
      padding: 0;
    }
    #root {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      width: 100%;
      /* dvh fills the dynamic viewport (including the iOS home-indicator
         zone) so the app's background runs edge to edge with no black
         bar. The FullscreenGame canvas scales to this same height, so the
         game itself extends into the home-indicator zone -- the system
         overlays a translucent home-indicator pill on top, which reads
         naturally over our dark grid. */
      height: 100vh;
      height: 100dvh;
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes driftIn  { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes driftOut { from { opacity: 1; transform: translateX(0); }            to { opacity: 0; transform: translateX(-20px); } }
    @keyframes slideIn  { from { transform: translateX(24px); }                                                          to { transform: translateX(0); } }
    @keyframes driftInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes driftOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }
    @keyframes slideInLeft { from { transform: translateX(-16px); } to { transform: translateX(0); } }
    /* Full-page screen transitions (start/online/playing swaps). Directional:
       incoming enters from the right moving left; outgoing exits to the right. */
    @keyframes pageInRight  { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pageOutRight { from { opacity: 1; transform: translateX(0); }    to { opacity: 0; transform: translateX(100%); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    /* Text caret blink for the Enter-Code slots (0.5s on / 0.5s off). */
    @keyframes caretBlink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
