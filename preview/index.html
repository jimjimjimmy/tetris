function TetrisGame2P() {
  const [settings, updateSetting] = useSettings();
  const [showSettings, setShowSettings] = React.useState(false);
  const [settingsSection, setSettingsSection] = React.useState(null);
  const [state, setState]   = React.useState(makeInitState2P);
  // Session win counts -- persist across rematches, reset on MENU or PLAY AGAIN.
  const [p1Wins, setP1Wins] = React.useState(0);
  const [p2Wins, setP2Wins] = React.useState(0);

  // Keep the module-level haptic and sfx objects in sync with React
  // settings state. Called synchronously every render so callbacks always
  // read the current toggles without stale-closure issues.
  haptic.configure(settings);
  sfx.configure(settings);

  const openSettings = (section) => {
    setSettingsSection(section || null);
    setShowSettings(true);
  };
  const closeSettings = () => {
    setShowSettings(false);
    setSettingsSection(null);
  };

  React.useEffect(() => {
    const id = setInterval(() => {
      setState(s => {
        if (s.phase !== "playing") return s;
        if (s.paused || s.summary) return s;
        let { board, aiTick, p1, p1Next, p1NextNext, p2, p2Next, p2NextNext, p1Lines, p2Lines, boundary } = s;
        const aiCfg = AI_LEVEL_CONFIG[s.aiLevel] || AI_LEVEL_CONFIG[3];
        let n1 = 0, n2 = 0;
        // Track which rows were full at lock time so we can flash them
        // briefly after they're cleared. Filled per-side just before
        // clearP*_2P runs (board still has the full rows at that moment).
        const clearedRowsThisTick = [];

        aiTick += 1;

        // P1 AI block: only active when the user picked P2 on the start
        // screen. When the user is P1, this block is skipped and P1 is
        // driven by applyP1 from touch + keyboard.
        if (s.playerSide === 2 && aiTick % aiCfg.aiPeriod === 0) {
          const getLandingY1 = (type, rot, x) => {
            const startY = Math.max(0, boundary - 4);
            for (let y = startY; y < ROWS_2P; y++) {
              if (!isValid2P(getCells(type, rot, x, y), board, boundary, 1)) continue;
              if (!isValid2P(getCells(type, rot, x, y - 1), board, boundary, 1)) return y;
            }
            return -1;
          };
          const SCORE_MIN_1 = boundary;
          const SCORE_MAX_1 = ROWS_2P - 1;
          const scoreP1 = (type, rot, x) => {
            const ly = getLandingY1(type, rot, x);
            if (ly < 0) return -Infinity;
            const sim = board.map(row => [...row]);
            for (const [c, r] of getCells(type, rot, x, ly)) {
              if (r >= 0 && r < ROWS_2P && c >= 0 && c < COLS) sim[r][c] = CELL_P1;
            }
            let score = 0;
            const [simAfter, cleared] = clearP1_2P(sim, boundary);
            score += cleared * 500;
            for (let r = SCORE_MIN_1; r <= SCORE_MAX_1; r++) {
              const filled = simAfter[r].filter(c => c !== CELL_EMPTY).length;
              score += filled * filled;
            }
            score -= Math.max(0, ly - SCORE_MIN_1 - 2) * 4;
            let holes = 0;
            for (let c = 0; c < COLS; c++) {
              let hasFillBelow = false;
              for (let r = SCORE_MAX_1; r >= SCORE_MIN_1; r--) {
                if (simAfter[r][c] !== CELL_EMPTY) hasFillBelow = true;
                else if (hasFillBelow) holes++;
              }
            }
            score -= holes * aiCfg.holePenalty;
            const colH = Array(COLS).fill(0);
            for (let c = 0; c < COLS; c++) {
              for (let r = SCORE_MIN_1; r <= SCORE_MAX_1; r++) {
                if (simAfter[r][c] !== CELL_EMPTY) colH[c] = r - boundary;
              }
            }
            let bumpiness = 0;
            for (let c = 1; c < COLS; c++) bumpiness += Math.abs(colH[c] - colH[c - 1]);
            score -= bumpiness * aiCfg.bumpPenalty;
            return score;
          };
          let bestRot1 = p1.rot, bestX1 = p1.x;
          if (Math.random() < aiCfg.randomRatio) {
            const opts = [];
            for (let rot = 0; rot < 4; rot++) {
              for (let x = 0; x < COLS; x++) {
                if (isValid2P(getCells(p1.type, rot, x, p1.y), board, boundary, 1)) opts.push({rot, x});
              }
            }
            if (opts.length) { const o = opts[Math.floor(Math.random() * opts.length)]; bestRot1 = o.rot; bestX1 = o.x; }
          } else {
            let best1 = -Infinity;
            for (let rot = 0; rot < 4; rot++) {
              for (let x = -1; x < COLS + 1; x++) {
                const sc = scoreP1(p1.type, rot, x);
                if (sc > best1) { best1 = sc; bestRot1 = rot; bestX1 = x; }
              }
            }
          }
          if (p1.rot !== bestRot1) {
            const nr = (p1.rot + 1) % 4;
            if (isValid2P(getCells(p1.type, nr, p1.x, p1.y), board, boundary, 1)) p1 = { ...p1, rot: nr };
          } else if (p1.x < bestX1) {
            if (isValid2P(getCells(p1.type, p1.rot, p1.x + 1, p1.y), board, boundary, 1)) p1 = { ...p1, x: p1.x + 1 };
          } else if (p1.x > bestX1) {
            if (isValid2P(getCells(p1.type, p1.rot, p1.x - 1, p1.y), board, boundary, 1)) p1 = { ...p1, x: p1.x - 1 };
          }
        }

        // P2 AI block: only active when the user picked P1 on the start
        // screen. When the user is P2, this block is skipped and P2 is
        // driven by applyP2 from touch + keyboard.
        if (s.playerSide === 1 && aiTick % aiCfg.aiPeriod === 0) {
          const getLandingY2 = (type, rot, x) => {
            for (let y = 0; y <= boundary + 4; y++) {
              if (!isValid2P(getCells(type, rot, x, y), board, boundary, 2)) continue;
              if (!isValid2P(getCells(type, rot, x, y + 1), board, boundary, 2)) return y;
            }
            return -1;
          };
          const SCORE_MIN_2 = 0, SCORE_MAX_2 = boundary - 1;
          const scoreP2 = (type, rot, x) => {
            const ly = getLandingY2(type, rot, x);
            if (ly < 0) return -Infinity;
            const sim = board.map(row => [...row]);
            for (const [c, r] of getCells(type, rot, x, ly)) {
              if (r >= 0 && r < ROWS_2P && c >= 0 && c < COLS) sim[r][c] = CELL_P2;
            }
            let score = 0;
            const [simAfter, cleared] = clearP2_2P(sim, boundary);
            score += cleared * 500;
            for (let r = SCORE_MIN_2; r <= SCORE_MAX_2; r++) {
              const filled = simAfter[r].filter(c => c !== CELL_EMPTY).length;
              score += filled * filled;
            }
            score -= Math.max(0, SCORE_MAX_2 - ly - 2) * 4;
            let holes = 0;
            for (let c = 0; c < COLS; c++) {
              let hasFillAbove = false;
              for (let r = SCORE_MIN_2; r <= SCORE_MAX_2; r++) {
                if (simAfter[r][c] !== CELL_EMPTY) hasFillAbove = true;
                else if (hasFillAbove) holes++;
              }
            }
            score -= holes * aiCfg.holePenalty;
            const colH = Array(COLS).fill(0);
            for (let c = 0; c < COLS; c++) {
              for (let r = SCORE_MAX_2; r >= SCORE_MIN_2; r--) {
                if (simAfter[r][c] !== CELL_EMPTY) { colH[c] = SCORE_MAX_2 - r + 1; }
              }
            }
            let bumpiness = 0;
            for (let c = 1; c < COLS; c++) bumpiness += Math.abs(colH[c] - colH[c - 1]);
            score -= bumpiness * aiCfg.bumpPenalty;
            return score;
          };
          let bestRot2 = p2.rot, bestX2 = p2.x;
          if (Math.random() < aiCfg.randomRatio) {
            const opts = [];
            for (let rot = 0; rot < 4; rot++) {
              for (let x = 0; x < COLS; x++) {
                if (isValid2P(getCells(p2.type, rot, x, p2.y), board, boundary, 2)) opts.push({rot, x});
              }
            }
            if (opts.length) { const o = opts[Math.floor(Math.random() * opts.length)]; bestRot2 = o.rot; bestX2 = o.x; }
          } else {
            let best2 = -Infinity;
            for (let rot = 0; rot < 4; rot++) {
              for (let x = -1; x < COLS + 1; x++) {
                const sc = scoreP2(p2.type, rot, x);
                if (sc > best2) { best2 = sc; bestRot2 = rot; bestX2 = x; }
              }
            }
          }
          if (p2.rot !== bestRot2) {
            const nr = (p2.rot + 1) % 4;
            if (isValid2P(getCells(p2.type, nr, p2.x, p2.y), board, boundary, 2)) p2 = { ...p2, rot: nr };
          } else if (p2.x < bestX2) {
            if (isValid2P(getCells(p2.type, p2.rot, p2.x + 1, p2.y), board, boundary, 2)) p2 = { ...p2, x: p2.x + 1 };
          } else if (p2.x > bestX2) {
            if (isValid2P(getCells(p2.type, p2.rot, p2.x - 1, p2.y), board, boundary, 2)) p2 = { ...p2, x: p2.x - 1 };
          }
        }

        // P1 physics with lock delay.
        // If the piece can move up, it does, and the lock-pending timer
        // clears (the piece is no longer stuck). If it can't move, the
        // timer starts; the piece doesn't lock until LOCK_DELAY_MS has
        // elapsed. Successful human input during this window resets the
        // timer (handled inside applyP1), up to MAX_LOCK_RESETS.
        if (isValid2P(getCells(p1.type, p1.rot, p1.x, p1.y - 1), board, boundary, 1)) {
          p1 = { ...p1, y: p1.y - 1, lockPendingTs: null, lockResets: 0 };
        } else {
          const nowMs = Date.now();
          if (p1.lockPendingTs == null) {
            // Start the timer this tick. Piece stays put, no lock yet.
            p1 = { ...p1, lockPendingTs: nowMs };
          } else if (nowMs - p1.lockPendingTs >= LOCK_DELAY_MS) {
            // Grace period elapsed -- commit the lock.
            board = lockPiece2P(board, getCells(p1.type, p1.rot, p1.x, p1.y), CELL_P1);
            // Snapshot the full rows in P1 territory BEFORE the clear
            // mutates the board, for the line-clear flash overlay.
            for (let r = boundary; r < ROWS_2P; r++) {
              if (board[r].every(v => v !== CELL_EMPTY)) clearedRowsThisTick.push(r);
            }
            const [b1, c1] = clearP1_2P(board, boundary);
            n1 = c1; board = b1;
            p1 = { type: p1Next, rot: 0, x: spawnX(p1Next), y: p1SpawnY2P(p1Next), lockPendingTs: null, lockResets: 0 };
            // Shift the 2-deep NEXT queue: p1NextNext becomes the new
            // next-to-spawn, and a fresh random piece enters the queue.
            p1Next     = p1NextNext;
            p1NextNext = randPiece();
            if (!isValid2P(getCells(p1.type, p1.rot, p1.x, p1.y), board, boundary, 1)) {
              return { ...s, board, p1, p1Next, p1NextNext, p2, p2Next, p2NextNext, phase: "over", winner: 2 };
            }
          }
          // else: still within grace -- piece stays put for this tick.
        }

        // P2 physics (mirror of P1, falling DOWN toward boundary).
        if (isValid2P(getCells(p2.type, p2.rot, p2.x, p2.y + 1), board, boundary, 2)) {
          p2 = { ...p2, y: p2.y + 1, lockPendingTs: null, lockResets: 0 };
        } else {
          const nowMs = Date.now();
          if (p2.lockPendingTs == null) {
            p2 = { ...p2, lockPendingTs: nowMs };
          } else if (nowMs - p2.lockPendingTs >= LOCK_DELAY_MS) {
            board = lockPiece2P(board, getCells(p2.type, p2.rot, p2.x, p2.y), CELL_P2);
            for (let r = 0; r < boundary; r++) {
              if (board[r].every(v => v !== CELL_EMPTY)) clearedRowsThisTick.push(r);
            }
            const [b2, c2] = clearP2_2P(board, boundary);
            n2 = c2; board = b2;
            p2 = { type: p2Next, rot: 0, x: spawnX(p2Next), y: 0, lockPendingTs: null, lockResets: 0 };
            // Shift the 2-deep P2 NEXT queue.
            p2Next     = p2NextNext;
            p2NextNext = randPiece();
            if (!isValid2P(getCells(p2.type, p2.rot, p2.x, p2.y), board, boundary, 2)) {
              return { ...s, board, p1, p1Next, p1NextNext, p2, p2Next, p2NextNext, phase: "over", winner: 1 };
            }
          }
        }

        // Territory shift: 1:1 mapping. Each row cleared on a side
        // moves the boundary 1 row toward the opponent. No decay,
        // no fractional carry-over (the previous accumulator design
        // caused the +1 -> +2 fencepost where the second clear's
        // 0.952 contribution got stuck below floor=1).
        let newBdy = boundary - n1 + n2;

        // Game-over clamps only -- no preventive piece-blocking clamp.
        // The boundary is allowed to push past locked pieces; the swept
        // range is then cleared (eviction) so the board stays consistent.
        let winner = null, phase = "playing";
        if (newBdy <= 0) {
          newBdy = 0; winner = 1; phase = "over";
        } else if (newBdy >= ROWS_2P) {
          newBdy = ROWS_2P; winner = 2; phase = "over";
        }

        // Stack follows boundary: when the boundary moves by delta rows,
        // the GAINER's entire locked stack translates with it so the
        // stack stays glued to the boundary edge (no visual gap).
        //   delta > 0  (P1 gained)  -> every CELL_P1 shifts UP by delta
        //   delta < 0  (P2 gained)  -> every CELL_P2 shifts DOWN by |delta|
        // Loser cells in the rows that just changed hands are dropped
        // (those rows are now in the gainer's territory; loser cells
        // cannot remain there). Cells that would shift off the board
        // are also dropped. Active pieces are NOT translated -- they
        // stay at their current position. If the boundary moves past
        // an active piece (e.g. P2 gain crossing a P1 piece's row),
        // the active piece is respawned from its NEXT queue so it
        // does not lock in the wrong territory.
        if (newBdy !== boundary) {
          const delta = boundary - newBdy;   // + = P1 gained, - = P2 gained
          const next = Array.from({length: ROWS_2P}, () => Array(COLS).fill(CELL_EMPTY));
          if (delta > 0) {
            // P1 gained: shift P1 cells UP by delta, drop P2 cells in swept range.
            for (let r = 0; r < newBdy; r++) {
              for (let c = 0; c < COLS; c++) {
                if (board[r][c] === CELL_P2) next[r][c] = CELL_P2;
              }
            }
            for (let r = boundary; r < ROWS_2P; r++) {
              for (let c = 0; c < COLS; c++) {
                if (board[r][c] === CELL_P1) {
                  const nr = r - delta;
                  if (nr >= 0 && nr < ROWS_2P) next[nr][c] = CELL_P1;
                }
              }
            }
          } else {
            // P2 gained: shift P2 cells DOWN by |delta|, drop P1 cells in swept range.
            const shift = -delta;
            for (let r = newBdy; r < ROWS_2P; r++) {
              for (let c = 0; c < COLS; c++) {
                if (board[r][c] === CELL_P1) next[r][c] = CELL_P1;
              }
            }
            for (let r = 0; r < boundary; r++) {
              for (let c = 0; c < COLS; c++) {
                if (board[r][c] === CELL_P2) {
                  const nr = r + shift;
                  if (nr >= 0 && nr < ROWS_2P) next[nr][c] = CELL_P2;
                }
              }
            }
          }
          board = next;

          // Active-piece eviction (safety net). isValid2P checks both
          // territory side and cell overlap. If the piece's current
          // cells are no longer valid under newBdy, respawn it from
          // the NEXT queue.
          if (!isValid2P(getCells(p1.type, p1.rot, p1.x, p1.y), board, newBdy, 1)) {
            p1 = { type: p1Next, rot: 0, x: spawnX(p1Next), y: p1SpawnY2P(p1Next), lockPendingTs: null, lockResets: 0 };
            p1Next     = p1NextNext;
            p1NextNext = randPiece();
          }
          if (!isValid2P(getCells(p2.type, p2.rot, p2.x, p2.y), board, newBdy, 2)) {
            p2 = { type: p2Next, rot: 0, x: spawnX(p2Next), y: 0, lockPendingTs: null, lockResets: 0 };
            p2Next     = p2NextNext;
            p2NextNext = randPiece();
          }
        }

        // "+N"/"-N" indicator reflects the ACTUAL boundary delta after
        // game-over clamps -- not the raw shift accumulator. This keeps
        // the indicator and the visual line in lockstep: the indicator
        // only fires when the line actually moves, and the row count
        // matches the cells visibly traversed.
        let lastGain = s.lastGain;
        const realShift = boundary - newBdy;  // +N => P1 gained, -N => P2 gained
        if (realShift > 0) {
          lastGain = { player: 1, rows: realShift, ts: Date.now() };
        } else if (realShift < 0) {
          lastGain = { player: 2, rows: -realShift, ts: Date.now() };
        }

        return {
          ...s,
          board, aiTick, p1, p1Next, p1NextNext, p2, p2Next, p2NextNext, phase,
          p1Lines: p1Lines + n1, p2Lines: p2Lines + n2,
          boundary: newBdy, winner, lastGain,
          clearAnim: clearedRowsThisTick.length > 0
            ? { rows: clearedRowsThisTick, ts: Date.now() }
            : s.clearAnim,
        };
      });
    }, TEST_SPEED ? 110 : (AI_LEVEL_CONFIG[state.aiLevel]?.tickMs || TICK_MS_DEFAULT));
    return () => clearInterval(id);
  }, [state.aiLevel]);

  // applyP1: human-input dispatcher for the P1 piece. Used by both the
  // touch-gesture handler (iOS) and the keyboard handler (laptop testing).
  // Each action mutates only p1.{x,rot,y} after isValid2P passes; if the
  // game is not in the playing state, the dispatcher is a no-op.
  //   tap   -> rotate CW
  //   left  -> p1.x - 1
  //   right -> p1.x + 1
  //   up    -> hard drop UP (buoyancy boost: slide to highest valid y)
  // NOTE: a "down" / move-backward action is intentionally NOT supported.
  // P1 floats UP toward the boundary; moving down would push the piece
  // away from its goal and felt confusing. Pieces only go up, sideways,
  // or rotate -- never backward.
  const applyP1 = React.useCallback((action) => {
    setState(s => {
      if (s.phase !== "playing" || s.paused || s.summary) return s;
      const { p1, board, boundary } = s;
      // Lock-delay reset: if the piece is currently in the lock-pending
      // window AND we haven't blown the reset cap, a successful input
      // resets the timer so the player can slide along the edge.
      const lockReset = (piece) => {
        if (piece.lockPendingTs == null) return {};
        if ((piece.lockResets || 0) >= MAX_LOCK_RESETS) return {};
        return { lockPendingTs: Date.now(), lockResets: (piece.lockResets || 0) + 1 };
      };
      if (action === "tap") {
        const nr = (p1.rot + 1) % 4;
        // Basic wall kick: try centered, then +1, then -1. Lets the
        // player rotate even when flush against a wall or against
        // another piece. No full SRS table -- just the single-cell
        // escape attempt. First-valid wins.
        for (const dx of [0, 1, -1]) {
          if (isValid2P(getCells(p1.type, nr, p1.x + dx, p1.y), board, boundary, 1)) {
            haptic.light();
            return { ...s, p1: { ...p1, rot: nr, x: p1.x + dx, ...lockReset(p1) } };
          }
        }
      } else if (action === "left") {
        if (isValid2P(getCells(p1.type, p1.rot, p1.x - 1, p1.y), board, boundary, 1)) {
          haptic.light();
          return { ...s, p1: { ...p1, x: p1.x - 1, ...lockReset(p1) } };
        }
      } else if (action === "right") {
        if (isValid2P(getCells(p1.type, p1.rot, p1.x + 1, p1.y), board, boundary, 1)) {
          haptic.light();
          return { ...s, p1: { ...p1, x: p1.x + 1, ...lockReset(p1) } };
        }
      } else if (action === "up") {
        // Hard drop UP: keep moving until invalid. P1 floats UP so smallest
        // valid y is the lock position. Tick physics will lock on next
        // frame. Hard drop bypasses lock-delay extension -- the timer is
        // set to a past instant so the next tick locks immediately.
        let y = p1.y;
        while (isValid2P(getCells(p1.type, p1.rot, p1.x, y - 1), board, boundary, 1)) {
          y--;
        }
        if (y !== p1.y) {
          // Fire pieceLock sound + haptic immediately -- don't wait for the
          // next tick (up to TICK_MS ms delay). hardDropFiredRef prevents
          // the tick-based useEffect from double-firing the same event.
          haptic.pieceLock();
          sfx.pieceLock();
          hardDropFiredRef.current = true;
          return { ...s, p1: { ...p1, y, lockPendingTs: Date.now() - LOCK_DELAY_MS, lockResets: MAX_LOCK_RESETS } };
        }
      } else if (action === "soft") {
        // Soft drop for P1: one row UP (y-1), with natural travel toward boundary.
        // Refreshes the lock-delay timer like any other successful input.
        if (isValid2P(getCells(p1.type, p1.rot, p1.x, p1.y - 1), board, boundary, 1)) {
          haptic.light();
          return { ...s, p1: { ...p1, y: p1.y - 1, ...lockReset(p1) } };
        }
      }
      return s;
    });
  }, []);

  // applyP2: mirror of applyP1 for the P2 piece (falls DOWN). The
  // "boost-toward-boundary" gesture for P2 is DOWN; the unsupported
  // "backward" gesture is UP.
  const applyP2 = React.useCallback((action) => {
    setState(s => {
      if (s.phase !== "playing" || s.paused || s.summary) return s;
      const { p2, board, boundary } = s;
      const lockReset = (piece) => {
        if (piece.lockPendingTs == null) return {};
        if ((piece.lockResets || 0) >= MAX_LOCK_RESETS) return {};
        return { lockPendingTs: Date.now(), lockResets: (piece.lockResets || 0) + 1 };
      };
      if (action === "tap") {
        const nr = (p2.rot + 1) % 4;
        // Basic wall kick (mirror of P1): try centered, then +1, then -1.
        for (const dx of [0, 1, -1]) {
          if (isValid2P(getCells(p2.type, nr, p2.x + dx, p2.y), board, boundary, 2)) {
            haptic.light();
            return { ...s, p2: { ...p2, rot: nr, x: p2.x + dx, ...lockReset(p2) } };
          }
        }
      } else if (action === "left") {
        if (isValid2P(getCells(p2.type, p2.rot, p2.x - 1, p2.y), board, boundary, 2)) {
          haptic.light();
          return { ...s, p2: { ...p2, x: p2.x - 1, ...lockReset(p2) } };
        }
      } else if (action === "right") {
        if (isValid2P(getCells(p2.type, p2.rot, p2.x + 1, p2.y), board, boundary, 2)) {
          haptic.light();
          return { ...s, p2: { ...p2, x: p2.x + 1, ...lockReset(p2) } };
        }
      } else if (action === "down") {
        // Hard drop DOWN: same pattern as P1's hard drop UP. Bypass
        // lock-delay extension by setting the timer to a past instant.
        let y = p2.y;
        while (isValid2P(getCells(p2.type, p2.rot, p2.x, y + 1), board, boundary, 2)) {
          y++;
        }
        if (y !== p2.y) {
          // Mirror of P1 hard drop: immediate sound + haptic.
          haptic.pieceLock();
          sfx.pieceLock();
          hardDropFiredRef.current = true;
          return { ...s, p2: { ...p2, y, lockPendingTs: Date.now() - LOCK_DELAY_MS, lockResets: MAX_LOCK_RESETS } };
        }
      } else if (action === "soft") {
        // Soft drop for P2: one row DOWN (y+1), with natural travel toward boundary.
        // Refreshes the lock-delay timer like any other successful input.
        if (isValid2P(getCells(p2.type, p2.rot, p2.x, p2.y + 1), board, boundary, 2)) {
          haptic.light();
          return { ...s, p2: { ...p2, y: p2.y + 1, ...lockReset(p2) } };
        }
      }
      return s;
    });
  }, []);

  // playerSideRef mirrors state.playerSide for closure-free access inside
  // the keyboard and touch-gesture event handlers (which run outside the
  // render cycle and would otherwise read a stale closure).
  const playerSideRef = React.useRef(state.playerSide);
  playerSideRef.current = state.playerSide;

  // Keyboard: "0" reset, "p"/"P" pause, arrows + space drive whichever
  // side the user picked on the start screen. Vertical arrows fire the
  // hard drop toward the boundary; the opposite arrow is a no-op.
  // Touch hard drop fires on lift after DROP_PX vertical travel.
  //   ArrowLeft / ArrowRight -- horizontal move
  //   ArrowUp                -- P1 hard drop (all the way up) / P2 no-op
  //   ArrowDown              -- P2 hard drop (all the way down) / P1 no-op
  //   Space                  -- rotate
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "0") setState(makeInitState2P());
      else if (e.key === "p" || e.key === "P") { setState(s => ({...s, paused: !s.paused})); return; }
      const side = playerSideRef.current;
      const apply = side === 2 ? applyP2 : applyP1;
      if      (e.key === "ArrowLeft")  apply("left");
      else if (e.key === "ArrowRight") apply("right");
      else if (e.key === "ArrowUp")    { if (side !== 2) apply("up"); }
      else if (e.key === "ArrowDown")  { if (side === 2) apply("down"); }
      else if (e.key === " ")          apply("tap");
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [applyP1, applyP2]);

  // Touch gestures: tap rotates, swipe (>=20px) moves. Tap window is <10px.
  // Distances in between are ignored (dead zone) so a wobbly tap does not
  // accidentally swipe. Attaches to document so the entire screen accepts
  // input -- the FullscreenGame wrapper already blocks default scroll/zoom.
  const playRef = React.useRef(null);
  const gestureRef = React.useRef(null);
  React.useEffect(() => {
    const el = gestureRef.current;
    if (!el) return;
    // Continuous gesture tracking. Horizontal moves fire DURING the touch
    // (every STEP_PX pixels of drag) so the piece tracks the finger live.
    // Vertical hard drop fires ONCE on lift (touchend) only when total
    // vertical travel exceeds DROP_PX deadzone -- small accidental movements
    // are ignored. Tap rotates on release if the finger barely moved.
    // Direction: P1 swipe-up fires "up"; P2 swipe-down fires "down".
    // Against-gravity swipes are intentionally no-ops.
    const STEP_PX    = 30;  // ratchet: each 30px of horizontal drag = one cell
    const TAP_PX     = 20;  // movement under this on both axes = tap (rotate)
    const DROP_PX    = 44;  // min vertical travel before hard drop fires on lift
    const LOCK_PX    = 10;  // min travel before axis is committed
    const AXIS_RATIO = 2;   // ady >= AXIS_RATIO * adx -> commit to vertical
    // axisLock: null (undecided), "h" (horizontal only), "v" (vertical only).
    // Set once per gesture when travel first exceeds LOCK_PX; reset on new touch.
    // "v" suppresses all horizontal steps (pure drop gesture).
    // "h" suppresses the drop on lift (pure move gesture).
    let startX = 0, startY = 0;
    let lastDx   = 0;
    let moved    = false;
    let axisLock = null;
    const onStart = (e) => {
      if (e.touches.length !== 1) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      lastDx = 0; moved = false; axisLock = null;
    };
    const onMove = (e) => {
      if (e.touches.length !== 1) return;
      const dx  = e.touches[0].clientX - startX;
      const dy  = e.touches[0].clientY - startY;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const side  = playerSideRef.current;
      const apply = side === 2 ? applyP2 : applyP1;
      // Commit to an axis once travel is enough to read intent.
      if (axisLock === null && (adx > LOCK_PX || ady > LOCK_PX)) {
        axisLock = ady >= AXIS_RATIO * adx ? "v" : "h";
      }
      // Horizontal steps only when not locked to vertical.
      if (axisLock !== "v") {
        while (dx - lastDx >=  STEP_PX) { apply("right"); lastDx += STEP_PX; moved = true; }
        while (dx - lastDx <= -STEP_PX) { apply("left");  lastDx -= STEP_PX; moved = true; }
      }
    };
    const onEnd = (e) => {
      if (e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const side  = playerSideRef.current;
      const apply = side === 2 ? applyP2 : applyP1;
      // Tap: finger barely moved on both axes and no cells were stepped.
      if (!moved && adx < TAP_PX && ady < TAP_PX) { apply("tap"); return; }
      // Hard drop: only when axis is vertical or still undecided.
      // Horizontal-locked gestures never trigger a drop.
      if (axisLock !== "h") {
        if (side === 2) {
          if (dy >= DROP_PX) apply("down");
        } else {
          if (dy <= -DROP_PX) apply("up");
        }
      }
    };
    // Attach to a transparent full-height gesture surface that spans from
    // x=0 to x=SIDEBAR_X (the entire left portion of the screen) so the
    // player can swipe/tap anywhere outside the right sidebar. Sidebar
    // chrome -- pause / info / gear / NEXT -- sits at x>=349, well past
    // SIDEBAR_X=320, so its taps never reach this surface.
    el.addEventListener("touchstart", onStart, { passive: true });
    el.addEventListener("touchmove",  onMove,  { passive: true });
    el.addEventListener("touchend",   onEnd,   { passive: true });
    return () => {
      el.removeEventListener("touchstart", onStart);
      el.removeEventListener("touchmove",  onMove);
      el.removeEventListener("touchend",   onEnd);
    };
    // state.phase is in the dep array so the effect RE-RUNS after the
    // user taps a side button on the start screen. Without it, playRef
    // is null at first mount (start screen is rendered, not the game)
    // so the effect returns early and never re-attaches once the play
    // area finally renders. Adding phase forces a clean re-attach on
    // every phase transition (start -> playing, playing -> over).
  }, [applyP1, applyP2, state.phase]);

  // Demo countdown
  React.useEffect(() => {
    const id = setInterval(() => {
      setState(s => {
        if (s.paused || s.summary || s.phase !== "playing") return s;
        const next = s.demoLeft - 1;
        if (next <= 0) {
          const winning = s.p1Lines > s.p2Lines ? 1 : s.p2Lines > s.p1Lines ? 2 : 0;
          return {...s, demoLeft: 0, summary: {p1Lines: s.p1Lines, p2Lines: s.p2Lines, boundary: s.boundary, winning}};
        }
        return {...s, demoLeft: next};
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);

  // Expire the "+N" gain indicator after GAIN_FADE_MS. Polls every 100ms
  // so the indicator clears even when paused (the bracket is a transient
  // UI marker, not gameplay state). Setting opacity via inline style on
  // the render lets CSS transition the fade smoothly to zero.
  React.useEffect(() => {
    const id = setInterval(() => {
      setState(s => {
        if (!s.lastGain) return s;
        if (Date.now() - s.lastGain.ts >= GAIN_FADE_MS) return { ...s, lastGain: null };
        return s;
      });
    }, 100);
    return () => clearInterval(id);
  }, []);

  // Expire the line-clear flash after CLEAR_FLASH_MS. Single setTimeout
  // scheduled per clearAnim (rather than a polling interval) since the
  // flash window is short and we want the cleanup to be precisely timed.
  React.useEffect(() => {
    if (!state.clearAnim) return;
    const ts = state.clearAnim.ts;
    const id = setTimeout(() => {
      setState(s => (s.clearAnim && s.clearAnim.ts === ts) ? { ...s, clearAnim: null } : s);
    }, CLEAR_FLASH_MS);
    return () => clearTimeout(id);
  }, [state.clearAnim]);

  // Haptic feedback via the `haptic` helper (module-level). Refs compare
  // current and previous values so each event fires exactly once per
  // transition. Helper fails silently when navigator.vibrate is missing
  // (iOS Safari) and will be swapped for @capacitor/haptics in v3.
  //   piece lock           = p1.type changed   ->  medium  (60ms)
  //   row clear            = p1Lines+p2Lines+  ->  heavy   (100ms)
  //   territory shift      = boundary changed  ->  heavy   (100ms)
  //   game over            = phase -> "over"   ->  pattern (200/100/200)
  // Move/rotate light (30ms) haptics fire inside applyP1/applyP2 so each
  // successful input -- keyboard or touch -- gets a tap.
  // When multiple events land in the same tick, the last call cancels the
  // previous one and only its pattern fires -- "most important event wins"
  // (game-over > shift > clear > lock).
  const prevP1TypeRef    = React.useRef(state.p1.type);
  const prevP2TypeRef    = React.useRef(state.p2.type);
  const prevLinesRef     = React.useRef(state.p1Lines + state.p2Lines);
  const prevBoundaryRef  = React.useRef(state.boundary);
  const prevPhaseRef     = React.useRef(state.phase);
  // Set to true when a hard drop fires sound+haptic immediately.
  // Prevents the tick-based useEffect from double-firing the same pieceLock
  // sound when the piece actually commits on the next tick.
  const hardDropFiredRef = React.useRef(false);
  React.useEffect(() => {
    // Piece lock: fires only when the HUMAN player's active piece type
    // changes (i.e. a new piece spawned). AI side is intentionally excluded.
    const humanTypeChanged = state.playerSide === 2
      ? state.p2.type !== prevP2TypeRef.current
      : state.p1.type !== prevP1TypeRef.current;
    // Line clear: any lines cleared this tick (either side counts).
    // linesThisTick carries the count so sfx can pick single vs multi.
    // Computed before pieceLock so the lock sound can be suppressed on
    // clear frames (new piece always spawns same tick as a clear, which
    // would fire both sounds simultaneously).
    const totalLines = state.p1Lines + state.p2Lines;
    const linesThisTick = totalLines - prevLinesRef.current;
    if (linesThisTick > 0) {
      haptic.lineClear(linesThisTick);
      sfx.lineClear(linesThisTick);
    }

    if (humanTypeChanged && state.phase === "playing" && linesThisTick === 0) {
      // Skip if hard drop already fired the sound immediately (suppresses
      // the up-to-one-tick duplicate caused by the tick-loop delay).
      if (!hardDropFiredRef.current) {
        haptic.pieceLock();
        sfx.pieceLock();
      }
    }
    // Always reset the flag when a new piece spawns, even if a line cleared
    // the same tick (in that case linesThisTick > 0 skips the block above,
    // but the flag still needs to clear for the next normal lock).
    if (humanTypeChanged) {
      hardDropFiredRef.current = false;
    }
    prevP1TypeRef.current = state.p1.type;
    prevP2TypeRef.current = state.p2.type;
    prevLinesRef.current = totalLines;

    // Boundary shift: gain vs loss relative to the human player's side.
    // boundary decreasing = P1 gaining territory
    // boundary increasing = P2 gaining territory
    if (state.boundary !== prevBoundaryRef.current) {
      const moved = state.boundary - prevBoundaryRef.current;
      const p1Gained = moved < 0;
      const humanGained = (state.playerSide === 1 && p1Gained)
                       || (state.playerSide === 2 && !p1Gained);
      if (humanGained) {
        haptic.boundaryGain();
        sfx.boundaryGain();
      } else {
        haptic.boundaryLoss();
        sfx.boundaryLoss();
      }
    }
    prevBoundaryRef.current = state.boundary;

    if (state.phase === "over" && prevPhaseRef.current !== "over") {
      haptic.gameOver();
      sfx.gameOver();
    }
    prevPhaseRef.current = state.phase;
  });

  const { board, p1, p2, p1Next, p1NextNext, p2Next, p2NextNext, p1Lines, p2Lines, phase, boundary, winner, paused, summary, lastGain, clearAnim, playerSide, aiLevel } = state;

  // NEXT queue routing: show whichever side the human is playing. P2's
  // queue while the user is P1, or P1's queue if anyone is observing
  // the start-screen flicker before a side is picked (defaults to P1).
  // For P1: next-to-spawn in BOTTOM slot (closer to P1's bottom territory)
  // For P2: next-to-spawn in TOP slot (closer to P2's top territory)
  const nextTop    = playerSide === 2 ? p2Next     : p1NextNext;
  const nextBottom = playerSide === 2 ? p2NextNext : p1Next;

  // Side selector: tapping a start-screen button transitions phase
  // "start" to "playing" and stores which side the user picked.
  // Currently both buttons start the game with the player controlling
  // P1 (the only side wired to gestures/keys today); playerSide is
  // remembered so future logic can swap which side AI controls.
  // selectSide starts the game and saves the side preference to settings.
  const selectSide = (side) => (e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    updateSetting("side", side);
    sfx.preload();   // first user gesture -- satisfies browser autoplay policy
    setState(s => ({ ...s, phase: "playing", playerSide: side, aiLevel: settings.level }));
  };

  // Start screen render -- short-circuits the rest of the layout.
  // Level selector moved to Settings (gear icon). P1/P2 buttons still
  // start the game immediately. Settings overlay shared via showSettings state.
  if (phase === "start") {
    return (
      <div style={{
        width: FRAME_W, height: GAME_2P_H,
        background: "#0a0a0a",
        position: "relative",
        overflow: "hidden",
        fontFamily: "'Inter', sans-serif",
        userSelect: "none",
        WebkitUserSelect: "none",
        color: "#fff",
      }}>
        {/* Grid background */}
        <div style={{
          position: "absolute", inset: 0,
          backgroundImage:
            `linear-gradient(${GRID_LINE_COLOR} 1px, transparent 1px), ` +
            `linear-gradient(90deg, ${GRID_LINE_COLOR} 1px, transparent 1px)`,
          backgroundSize: "20px 20px, 20px 20px",
          backgroundPosition: "0 0, 1px 0",
          pointerEvents: "none",
        }} />

        {/* Gear icon -- top-right, same position as in-game */}
        <div
          onPointerDown={() => openSettings()}
          onTouchStart={e => e.stopPropagation()}
          style={{
            position: "absolute",
            left: ICON_GEAR_X, top: `calc(${ICON_GEAR_Y}px + env(safe-area-inset-top))`,
            width: ICON_SIZE, height: ICON_SIZE,
            color: "#fff", opacity: CHROME_OPACITY,
            cursor: "pointer",
          }}>
          <GearIcon />
        </div>

        {/* Centered text stack */}
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          gap: 48,
          paddingTop: "env(safe-area-inset-top)",
          paddingBottom: "max(20px, env(safe-area-inset-bottom))",
        }}>
          <div style={{
            fontFamily: "monospace",
            fontSize: 28, fontWeight: 700,
            letterSpacing: 10,
            color: "#fff",
          }}>D R I F T</div>

          <div style={{
            fontFamily: "monospace",
            fontSize: 11, fontWeight: 600,
            letterSpacing: 4,
            color: "rgba(255,255,255,0.5)",
            textTransform: "uppercase",
          }}>Select your side</div>

          {/* Level indicator -- tapping opens settings scrolled to Game section */}
          <div
            onPointerDown={() => openSettings("game")}
            onTouchStart={e => e.stopPropagation()}
            style={{
              fontFamily: "monospace", fontSize: 10, fontWeight: 600,
              letterSpacing: 4, color: "rgba(255,255,255,0.25)",
              textTransform: "uppercase",
              cursor: "pointer",
            }}
          >Level &nbsp; {settings.level}</div>

          <div style={{ display: "flex", flexDirection: "column", gap: 24, alignItems: "stretch", width: 280 }}>
            <div
              onPointerDown={selectSide(1)}
              onTouchStart={(e) => e.stopPropagation()}
              style={{
                fontFamily: "monospace",
                fontSize: 16, fontWeight: 600,
                letterSpacing: 2,
                color: "rgba(255,255,255,0.85)",
                padding: "16px 20px",
                textAlign: "center",
                cursor: "pointer",
                userSelect: "none",
              }}
            >[ P1↑ ]</div>

            <div
              onPointerDown={selectSide(2)}
              onTouchStart={(e) => e.stopPropagation()}
              style={{
                fontFamily: "monospace",
                fontSize: 16, fontWeight: 600,
                letterSpacing: 2,
                color: "rgba(255,255,255,0.85)",
                padding: "16px 20px",
                textAlign: "center",
                cursor: "pointer",
                userSelect: "none",
              }}
            >[ P2↓ ]</div>
          </div>
        </div>

        {/* Version stamp */}
        <div style={{
          position: "absolute",
          left: 0, right: 0,
          bottom: `max(20px, env(safe-area-inset-bottom))`,
          display: "flex", justifyContent: "space-between",
          padding: "0 24px",
          fontFamily: "monospace",
          fontSize: 12, fontWeight: 500,
          letterSpacing: 2,
          color: "rgba(255,255,255,0.35)",
          pointerEvents: "none",
        }}>
          <span>{APP_VERSION} &nbsp; • &nbsp; {APP_COMMIT}</span>
          <span>{relTime(APP_BUILD_DATE)}</span>
        </div>

        {/* Settings overlay -- shared with in-game, accessible from start screen too */}
        {showSettings && (
          <SettingsScreen
            settings={settings}
            initialSection={settingsSection}
            onUpdate={(key, val) => {
              updateSetting(key, val);
              if (key === "level") setState(s => ({ ...s, aiLevel: val }));
            }}
            onClose={closeSettings}
          />
        )}
      </div>
    );
  }

  // Human player always gets bright locked color; AI gets dark, regardless of side.
  const humanCell = playerSide === 2 ? CELL_P2 : CELL_P1;
  const aiCell    = playerSide === 2 ? CELL_P1 : CELL_P2;
  const cellColor = { [CELL_EMPTY]: null, [humanCell]: P1_LOCKED_COLOR, [aiCell]: P2_LOCKED_COLOR };
  const grid = board.map(row => row.map(v => cellColor[v]));

  // Ghost piece: a faint preview of where the HUMAN player's active piece
  // will land if dropped from its current position. Standard Tetris ghost
  // behavior. Only shown for the human-controlled side; the AI's piece has
  // no ghost. Painted BEFORE the active piece so the active piece visually
  // overwrites any overlap (which only happens when the piece is already
  // at its landing position, i.e. about to lock).
  let laneData = null;
  if (playerSide === 1 || playerSide === 2) {
    const piece     = playerSide === 1 ? p1 : p2;
    const ghostStep = playerSide === 1 ? -1 : +1;  // P1 floats UP, P2 falls DOWN
    let gy = piece.y;
    while (isValid2P(getCells(piece.type, piece.rot, piece.x, gy + ghostStep), board, boundary, playerSide)) {
      gy += ghostStep;
    }
    if (gy !== piece.y) {
      getCells(piece.type, piece.rot, piece.x, gy).forEach(([c, r]) => {
        if (r >= 0 && r < ROWS_2P && c >= 0 && c < COLS && !grid[r][c]) {
          grid[r][c] = GHOST_COLOR;
        }
      });
    }
    const pCells = getCells(piece.type, piece.rot, piece.x, piece.y);
    const lMinC  = Math.min(...pCells.map(([c]) => c));
    const lMaxC  = Math.max(...pCells.map(([c]) => c));
    const topRow = playerSide === 1 ? boundary : 0;
    const botRow = playerSide === 1 ? ROWS_2P : boundary;
    laneData = { minC: lMinC, maxC: lMaxC, topPx: topRow * CELL, hPx: (botRow - topRow) * CELL };
  }

  // Active pieces -- BOTH players -- render at the same translucent color
  // (ACTIVE_COLOR = opacity 0.5). The Figma design uses a single base color
  // and only varies opacity to distinguish locked vs active and per-player.
  getCells(p1.type, p1.rot, p1.x, p1.y).forEach(([c, r]) => {
    if (r >= 0 && r < ROWS_2P && c >= 0 && c < COLS) grid[r][c] = ACTIVE_COLOR;
  });
  getCells(p2.type, p2.rot, p2.x, p2.y).forEach(([c, r]) => {
    if (r >= 0 && r < ROWS_2P && c >= 0 && c < COLS) grid[r][c] = ACTIVE_COLOR;
  });

  // Pause toggle for the on-screen pause button. Stops touch from
  // propagating so the gesture handler does not also fire (the gesture
  // handler is attached to the play area; the pause button is in the
  // sidebar so this is defensive but harmless).
  const togglePause = (e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    setState(s => ({...s, paused: !s.paused}));
  };

  // ── Match / set outcome handlers ──────────────────────────────────────
  // Increment the winner's tally, then restart the match immediately
  // in the same side + level config. Phase goes straight to "playing"
  // so the user never sees the start screen again mid-set.
  const handleRematch = (winnerSide) => {
    setP1Wins(w => w + (winnerSide === 1 ? 1 : 0));
    setP2Wins(w => w + (winnerSide === 2 ? 1 : 0));
    setState(s => ({...makeInitState2P(), phase: "playing", playerSide: s.playerSide, aiLevel: s.aiLevel}));
  };

  // Reset the whole session (wins + match) and go back to start screen.
  const handleMenu = () => {
    setP1Wins(0);
    setP2Wins(0);
    setState(s => ({...makeInitState2P(), playerSide: s.playerSide, aiLevel: s.aiLevel}));
  };

  // Set is over -- reset wins to 0-0 and start a fresh set immediately
  // in the same side + level config (no start screen).
  const handlePlayAgain = (winnerSide) => {
    setP1Wins(0);
    setP2Wins(0);
    setState(s => ({...makeInitState2P(), phase: "playing", playerSide: s.playerSide, aiLevel: s.aiLevel}));
  };

  // ── Stack-height brackets (Figma 128-3004) ───────────────────────────
  // For each player, find how many rows of their territory currently
  // contain at least one of their cells. The bracket length equals
  // (rows-with-cells) * CELL.
  //   P2 stack: topmost P2 row (minP2) -> boundary-1
  //   P1 stack: boundary -> bottommost P1 row (maxP1)
  let _minP2 = ROWS_2P, _maxP1 = -1;
  for (let r = 0; r < ROWS_2P; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      if (v === CELL_P2 && r < _minP2) _minP2 = r;
      if (v === CELL_P1 && r > _maxP1) _maxP1 = r;
    }
  }
  const p2StackRows = _minP2 < boundary ? (boundary - _minP2) : 0;
  const p1StackRows = _maxP1 >= boundary ? (_maxP1 - boundary + 1) : 0;
  const boundaryY   = PLAY_Y + boundary * CELL;  // y of the boundary line in frame coords
  const originY     = PLAY_Y + BDY_2P * CELL;    // y of the fixed origin (neutral) line, never moves

  // ── Boundary change indicator (one per screen, local-player view) ────
  // Single indicator from the LOCAL player's perspective. Persistent while
  // the live boundary differs from the origin (BDY_2P). The vertical line
  // spans from the origin (dotted) to the live boundary (dashed). The
  // number reflects the actual row gap. Sign + color depend on whether
  // the local player is currently AHEAD (+, green #2fff00) or BEHIND
  // (-, red #ff0000) per Figma 152-1747 / 152-2247.
  //   Local P1 ahead  -> "+N" green, text below the live line in P1 territory
  //   Local P1 behind -> "-N" red,   text below the live line in P1 territory
  //   Local P2 ahead  -> "+N" green, text above the live line in P2 territory
  //   Local P2 behind -> "-N" red,   text above the live line in P2 territory
  let bdyView = null;
  if (boundary !== BDY_2P && (playerSide === 1 || playerSide === 2)) {
    const gap         = BDY_2P - boundary;        // + = P1 ahead, - = P2 ahead
    const gainerSide  = gap > 0 ? 1 : 2;
    const localAhead  = gainerSide === playerSide;
    const sign        = localAhead ? "+" : "-";
    const rows        = Math.abs(gap);
    // Base hex (Figma) so we can apply Figma's per-element opacities
    // via the CSS opacity property (0.5 on cap + text, 0.15 on stem).
    const colorHex    = localAhead ? GAIN_HEX : LOSS_HEX;
    // Pre-mixed rgba for the live-dash linear-gradient.
    const dashRgba    = localAhead ? GAIN_DASH_RGBA : LOSS_DASH_RGBA;
    const bracketTop  = Math.min(originY, boundaryY);
    const bracketH    = Math.abs(originY - boundaryY);
    // Cap sits at the LIVE boundary end of the bracket (where the
    // dashed line is). For gain (live above origin) that's the top
    // edge of the bracket; for loss (live below origin) it's the
    // bottom edge.
    const capTop = boundaryY;
    // Text sits at the live boundary, on the LOCAL player's side.
    // P1 territory is below boundary -> text below live line.
    // P2 territory is above boundary -> text above live line.
    const textTop = (originY + boundaryY) / 2 - 5;  // midpoint between origin and live line, minus half font-height (10px/2)
    bdyView = { sign, rows, colorHex, dashRgba, bracketTop, bracketH, capTop, textTop };
  }

  return (
    <div style={{
      width: FRAME_W, height: GAME_2P_H,
      background: "#0a0a0a",
      position: "relative",
      overflow: "hidden",
      fontFamily: "monospace",
      userSelect: "none",
      WebkitUserSelect: "none",
    }}>

      {/* Background-layer stack (Figma 145-3068, exact match, BOTTOM->TOP):
            (1) 20x20 grid lines    -- 145:3069 + 145:3091
            (2) Radial gradient 1   -- 145:3138, circle r=663 at (201,211),
                                        rgba(17,18,19,1)->0 at wrapper opacity 0.5
            (3) Radial gradient 2   -- 145:3139, circle r=496 at (201,437)
            (4) Gradient Stripe     -- 145:3141, solid black 322x874 at (0,0)
                                        at opacity 0.3 -- darkens the play zone
          Each layer is its own div, ordered in DOM so later siblings stack
          on top -- matching the Figma layer order exactly. */}

      {/* (1) 20x20 grid lines across the entire 402x880 frame.
          backgroundPosition: vertical lines at x=1,21,41,...,261,...,321
          (PLAY_X=61 + 20c lands on every vertical line); horizontal lines
          at y=0,20,40,...,880 (PLAY_Y=0 + 20r lands on every line). */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage:
          `linear-gradient(${GRID_LINE_COLOR} 1px, transparent 1px), ` +
          `linear-gradient(90deg, ${GRID_LINE_COLOR} 1px, transparent 1px)`,
        backgroundSize: "20px 20px, 20px 20px",
        backgroundPosition: "0 0, 1px 0",
        pointerEvents: "none",
      }} />

      {/* (2) + (3) Two radial gradient layers, Figma exact values:
          rgba(17,18,19,1)->0 with wrapper opacity 0.5 = effective center
          alpha 0.5. Centers (201,211) and (201,437). Radii are
          r=10 * matrix scale = 663 and 496 respectively. */}
      <div style={{
        position: "absolute", inset: 0,
        background:
          // Mobile-Safari compensation: source Figma stops are
          // rgba(17,18,19,0.5); iOS renders those near-black. RGB bumped
          // ~+115% (HSL lightness +~18%) and center alpha +0.05 so the
          // dual-vignette reads with depth and texture on iPhone.
          "radial-gradient(circle 663px at 201px 211px, rgba(36,38,44,0.55), rgba(36,38,44,0)), " +
          "radial-gradient(circle 496px at 201px 437px, rgba(36,38,44,0.55), rgba(36,38,44,0))",
        pointerEvents: "none",
      }} />

      {/* (4) Gradient Stripe (Figma 145:3141): solid black at opacity 0.3
          over a 322x874 region at (0,0). Darkens the LEFT 322px (play-area
          zone) while leaving the right ~80px sidebar relatively brighter. */}
      <div style={{
        position: "absolute",
        left: 0, top: 0, width: 322, height: GAME_2P_H,
        // Mobile-Safari compensation: source alpha 0.3 crushes the play
        // zone on iPhone; reduced to 0.18 so depth is visible without
        // killing the gradient texture.
        background: "rgba(0, 0, 0, 0.18)",
        pointerEvents: "none",
      }} />

      {/* ── Origin line (left + right). Solid 1px fixed at ROWS_2P / 2,
          never moves. Left stub at DASH_LEFT_X, right stub at
          DASH_RIGHT_X with ORIGIN_RIGHT_W. When boundary shifts, the
          bdyView block adds colored dashed lines at the live boundary Y
          on both margins, visually distinct from this fixed origin. ── */}
      <div style={{
        position: "absolute",
        left: DASH_LEFT_X, top: originY, width: DASH_LEFT_W, height: 1,
        background: ORIGIN_DASH_COLOR,
        pointerEvents: "none",
      }} />
      <div style={{
        position: "absolute",
        left: DASH_RIGHT_X, top: originY, width: ORIGIN_RIGHT_W, height: 1,
        background: ORIGIN_DASH_COLOR,
        pointerEvents: "none",
      }} />

      {/* ── Left-side stack-height brackets (Figma 128-3004 nodes
          135:3922 + 135:3929). Children are positioned with top/bottom
          so the cap stays glued to its wrapper edge when the wrapper's
          `top` and `height` animate. `top` and `height` transition with
          BRACKET_EASE so the bracket slides instead of snapping. ── */}
      {p2StackRows > 0 && (
        <div style={{
          position: "absolute",
          left: BRACKET_X, top: boundaryY - p2StackRows * CELL,
          width: BRACKET_W, height: p2StackRows * CELL,
          pointerEvents: "none",
          transition: `top ${BRACKET_EASE}, height ${BRACKET_EASE}`,
        }}>
          {/* Cap (top) glued to top edge */}
          <div style={{ position: "absolute", left: 0, top: 0, width: BRACKET_CAP_W, height: 1, background: BRACKET_COLOR }} />
          {/* Stem stretches between cap and bottom of wrapper */}
          <div style={{ position: "absolute", left: BRACKET_STEM_X, top: 1, bottom: 0, width: 1, background: BRACKET_COLOR }} />
        </div>
      )}
      {p1StackRows > 0 && (
        <div style={{
          position: "absolute",
          left: BRACKET_X, top: boundaryY,
          width: BRACKET_W, height: p1StackRows * CELL,
          pointerEvents: "none",
          transition: `top ${BRACKET_EASE}, height ${BRACKET_EASE}`,
        }}>
          {/* Stem stretches between top of wrapper and cap */}
          <div style={{ position: "absolute", left: BRACKET_STEM_X, top: 0, bottom: 1, width: 1, background: BRACKET_COLOR }} />
          {/* Cap (bottom) glued to bottom edge */}
          <div style={{ position: "absolute", left: 0, bottom: 0, width: BRACKET_CAP_W, height: 1, background: BRACKET_COLOR }} />
        </div>
      )}

      {/* ── Boundary change indicator (right side, local player only). The
          stem extends from the live boundary (dashed) to the origin
          (dotted). Cap sits at the live boundary end. Sign + color
          come from the local player's perspective per Figma 152-1747
          (gain) / 152-2247 (loss):
            ahead  -> "+N" + green  (#2fff00)
            behind -> "-N" + red    (#ff0000)
          Element opacities per Figma: stem 0.15 (thin guide), cap and
          text 0.5 (muted accent). Persistent while boundary != BDY_2P;
          top/height transition with BRACKET_EASE so the line glides as
          the boundary shifts. ── */}
      {bdyView && (
        <React.Fragment>
          {/* Live boundary dashed line -- left margin. Only shown when boundary
              has shifted (bdyView active) so it never overlaps the solid origin
              stub at neutral. Slides with BRACKET_EASE when boundary moves. */}
          <div style={{
            position: "absolute",
            left: DASH_LEFT_X, top: boundaryY, width: DASH_LEFT_W, height: 1,
            backgroundImage: `linear-gradient(90deg, ${bdyView.dashRgba} 0, ${bdyView.dashRgba} ${DASH_SEG}px, transparent ${DASH_SEG}px, transparent ${DASH_SEG * 2}px)`,
            backgroundSize: `${DASH_SEG * 2}px 1px`,
            backgroundRepeat: "repeat-x",
            pointerEvents: "none",
            transition: `top ${BRACKET_EASE}`,
          }} />
          {/* Live boundary dashed line -- right margin. ORIGIN_RIGHT_W keeps it
              within the right gutter; same color and animation as left. */}
          <div style={{
            position: "absolute",
            left: DASH_RIGHT_X, top: boundaryY, width: ORIGIN_RIGHT_W, height: 1,
            backgroundImage: `linear-gradient(90deg, ${bdyView.dashRgba} 0, ${bdyView.dashRgba} ${DASH_SEG}px, transparent ${DASH_SEG}px, transparent ${DASH_SEG * 2}px)`,
            backgroundSize: `${DASH_SEG * 2}px 1px`,
            backgroundRepeat: "repeat-x",
            pointerEvents: "none",
            transition: `top ${BRACKET_EASE}`,
          }} />
          {/* Bracket stem -- 1px wide vertical from origin to live, opacity 0.15 */}
          <div style={{
            position: "absolute",
            left: GAIN_BRACKET_X + BRACKET_STEM_X, top: bdyView.bracketTop,
            width: 1, height: bdyView.bracketH,
            background: bdyView.colorHex,
            opacity: 0.15,
            pointerEvents: "none",
            transition: `top ${BRACKET_EASE}, height ${BRACKET_EASE}, background-color 200ms linear`,
          }} />
          {/* Bracket cap -- 4px x 1px horizontal at the LIVE boundary end, opacity 0.5 */}
          <div style={{
            position: "absolute",
            left: GAIN_BRACKET_X, top: bdyView.capTop,
            width: BRACKET_CAP_W, height: 1,
            background: bdyView.colorHex,
            opacity: 0.5,
            pointerEvents: "none",
            transition: `top ${BRACKET_EASE}, background-color 200ms linear`,
          }} />
          {/* "+N" / "-N" text -- Inter Regular 10/2px, uppercase, opacity 0.5 */}
          <div style={{
            position: "absolute",
            left: GAIN_TEXT_X, top: bdyView.textTop,
            fontFamily: "'Inter', sans-serif",
            fontWeight: 400,
            fontSize: 10,
            lineHeight: "10px",
            letterSpacing: 2,
            textTransform: "uppercase",
            color: bdyView.colorHex,
            opacity: 0.5,
            pointerEvents: "none",
            transition: `top ${BRACKET_EASE}, color 200ms linear`,
            fontVariantNumeric: "tabular-nums",
            whiteSpace: "nowrap",
          }}>{bdyView.sign}{bdyView.rows}</div>
        </React.Fragment>
      )}

      {/* Right Panel background -- the slightly-darker sidebar column.
          Figma 124:1829: bg rgba(17,18,19,0.5), border-l 1px solid
          rgba(49,50,51,0.5). Sits BELOW the icons/pause/NEXT content
          but ABOVE the gradients + grid so the right side reads as a
          distinct panel. */}
      <div style={{
        position: "absolute",
        left: SIDEBAR_X, top: 0,
        width: SIDEBAR_W, height: GAME_2P_H,
        background: "rgba(17, 18, 19, 0.5)",
        borderLeft: "1px solid rgba(49, 50, 51, 0.5)",
        pointerEvents: "none",
      }} />

      {laneData && (
        <React.Fragment>
          <div style={{
            position: "absolute",
            left: PLAY_X + laneData.minC * CELL, top: laneData.topPx,
            width: 1, height: laneData.hPx,
            backgroundImage: `repeating-linear-gradient(to bottom, ${LANE_COLOR} 0px, ${LANE_COLOR} 2px, transparent 2px, transparent 4px)`,
            pointerEvents: "none",
          }} />
          <div style={{
            position: "absolute",
            left: PLAY_X + (laneData.maxC + 1) * CELL, top: laneData.topPx,
            width: 1, height: laneData.hPx,
            backgroundImage: `repeating-linear-gradient(to bottom, ${LANE_COLOR} 0px, ${LANE_COLOR} 2px, transparent 2px, transparent 4px)`,
            pointerEvents: "none",
          }} />
        </React.Fragment>
      )}

      {/* Play area: 200x400 at (61, 237). Centered vertically with
          breathing room above and below for future territory animations. */}
      <div
        ref={playRef}
        style={{position: "absolute", top: PLAY_Y, left: PLAY_X, width: PLAY_W, height: ROWS_2P * CELL}}
      >
        <BoardViewport
          grid={grid}
          boundary={boundary}
          startRow={0}
          endRow={ROWS_2P}
          animateBoundary={true}
          showBoundary={false}
        />
      </div>

      {/* Line-clear flash overlay. For each row that was full at lock
          time, paint a white bar at its OLD pixel position for
          CLEAR_FLASH_MS. Stack-follows-boundary moves cells out from
          under the flash, so visually the flash reads as "this row
          just vanished". pointerEvents: none so it never blocks touch. */}
      {clearAnim && clearAnim.rows.map(r => (
        <div key={r} style={{
          position: "absolute",
          left: PLAY_X,
          top: PLAY_Y + r * CELL,
          width: PLAY_W,
          height: CELL,
          background: "rgba(255, 255, 255, 0.7)",
          pointerEvents: "none",
        }} />
      ))}

      {/* Gesture-capture surface -- transparent, spans the full left
          column (x=0 to SIDEBAR_X, full height). All touch listeners
          attach here so swipes/taps register anywhere outside the
          right sidebar, not just on the narrow play area. Sidebar
          icons (info/gear/pause/NEXT) sit at x>=349 > SIDEBAR_X=320,
          so they remain independently tappable. */}
      <div
        ref={gestureRef}
        style={{
          position: "absolute",
          top: 0, left: 0,
          width: SIDEBAR_X, height: GAME_2P_H,
          background: "transparent",
          touchAction: "none",
        }}
      />

      {/* Info icon -- white SVG at opacity 0.3 (Figma 124:2276). The
          `top` adds env(safe-area-inset-top) so the icon is pushed BELOW
          the iOS status bar (notch / dynamic island) while the grid and
          gradients underneath still extend behind the status bar. On
          devices without an inset (desktop, Android, mobile Safari with
          URL bar) env() resolves to 0 and the icon sits at its base 32. */}
      <div style={{
        position: "absolute",
        left: ICON_INFO_X, top: `calc(${ICON_INFO_Y}px + env(safe-area-inset-top))`,
        width: ICON_SIZE, height: ICON_SIZE,
        color: "#fff", opacity: CHROME_OPACITY,
      }}>
        <InfoIcon />
      </div>

      {/* Gear icon -- white SVG at opacity 0.3 (Figma 124:2233). Tapping opens settings. */}
      <div
        onPointerDown={() => openSettings()}
        onTouchStart={e => e.stopPropagation()}
        style={{
          position: "absolute",
          left: ICON_GEAR_X, top: `calc(${ICON_GEAR_Y}px + env(safe-area-inset-top))`,
          width: ICON_SIZE, height: ICON_SIZE,
          color: "#fff", opacity: CHROME_OPACITY,
          cursor: "pointer",
        }}>
        <GearIcon />
      </div>

      {/* Score pips hidden -- win tracking logic intact (p1Wins, p2Wins,
          WINS_TO_WIN), display treatment TBD. */}

      {/* Pause button: two #d9d9d9 bars (Figma 124:2218). The visible icon
          is 12x16; a transparent 48x48 hit box centered on it enlarges the
          touch target for ergonomic thumb reach. */}
      <div
        onPointerDown={togglePause}
        onTouchStart={(e) => e.stopPropagation()}
        style={{
          position: "absolute",
          left: PAUSE_X + (PAUSE_BAR_W + PAUSE_BAR_GAP + PAUSE_BAR_W) / 2 - 24,
          top:  PAUSE_Y + PAUSE_BAR_H / 2 - 24,
          width: 48, height: 48,
          cursor: "pointer",
        }}
      >
        {/* visible bars relative to the 48x48 hit box */}
        <div style={{
          position: "absolute",
          left: 24 - (PAUSE_BAR_W + PAUSE_BAR_GAP + PAUSE_BAR_W) / 2,
          top:  24 - PAUSE_BAR_H / 2,
          width: PAUSE_BAR_W, height: PAUSE_BAR_H,
          background: PAUSE_COLOR,
        }} />
        <div style={{
          position: "absolute",
          left: 24 + PAUSE_BAR_GAP / 2,
          top:  24 - PAUSE_BAR_H / 2,
          width: PAUSE_BAR_W, height: PAUSE_BAR_H,
          background: PAUSE_COLOR,
        }} />
      </div>

      {/* NEXT block (Figma 124:1463). Label is Inter 600 / 10px / 2px
          letter-spacing / uppercase, opacity 0.3. Newer pieces enter the
          TOP slot (opacity 0.5) and shift DOWN to the bottom slot
          (opacity 0.2) as they get closer to being spawned.

          Bottom safe-area: the block's `top` is shifted UP by max(20px,
          env(safe-area-inset-bottom)) so on iPhones with a home indicator
          (~34px), the strip clears the indicator. The 20px floor keeps
          some breathing room on devices without a real bottom inset. */}
      <div style={{position: "absolute", left: NEXT_X, top: `calc(${NEXT_Y}px - max(20px, env(safe-area-inset-bottom)))`, width: NEXT_W, color: "#fff"}}>
        <div style={{
          width: NEXT_W, height: NEXT_LABEL_H,
          fontFamily: "'Inter', sans-serif",
          fontWeight: 600,
          fontSize: 10, letterSpacing: 2,
          textAlign: "center",
          textTransform: "uppercase",
          opacity: CHROME_OPACITY,
        }}>Next</div>
        {/* TOP slot -- newest piece (most recently added to the queue) */}
        <div style={{
          position: "absolute",
          left: 15, top: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          width: 30, height: 20,
          opacity: 0.5,
        }}>
          <CompactNext type={nextTop} />
        </div>
        {/* BOTTOM slot -- next piece to spawn */}
        <div style={{
          position: "absolute",
          left: 15, top: 64,
          display: "flex", alignItems: "center", justifyContent: "center",
          width: 30, height: 20,
          opacity: 0.2,
        }}>
          <CompactNext type={nextBottom} />
        </div>
      </div>

      {/* PAUSED overlay -- placeholder, simple text */}
      {paused && !summary && phase === "playing" && (
        <div style={{
          position: "absolute", inset: 0,
          background: "rgba(0,0,0,0.55)",
          display: "flex", alignItems: "center", justifyContent: "center",
          pointerEvents: "none",
        }}>
          <div style={{fontSize: 28, fontWeight: 700, letterSpacing: 8, color: "#fff"}}>PAUSED</div>
        </div>
      )}

      {/* DEMO COMPLETE summary overlay */}
      {summary && (
        <div style={{
          position: "absolute", inset: 0,
          background: "rgba(0,0,0,0.88)",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
        }}>
          <div style={{fontSize: 24, fontWeight: 700, letterSpacing: 5, color: "#fff", marginBottom: 18}}>DEMO COMPLETE</div>
          <div style={{fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.55)", marginBottom: 4}}>
            P1 {summary.p1Lines}  /  P2 {summary.p2Lines}
          </div>
          <div style={{fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.55)", marginBottom: 4}}>
            boundary {summary.boundary}
          </div>
          <div style={{fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.55)", marginBottom: 24}}>
            {summary.winning === 1 ? "P1 leading" : summary.winning === 2 ? "P2 leading" : "tied"}
          </div>
          <div
            onPointerDown={() => setState(s => ({...makeInitState2P(), aiLevel: s.aiLevel}))}
            style={{
              padding: "12px 36px", background: "#ff3333",
              color: "#fff", borderRadius: 6,
              fontSize: 12, fontWeight: 700, letterSpacing: 3,
              cursor: "pointer",
            }}
          >REMATCH</div>
        </div>
      )}

      {/* Match-over overlay and set-over overlay -- both gated on phase "over".
          displayP1/displayP2 show the UPDATED tally (win credited instantly
          so the score on-screen matches the pips). setOver = one player has
          reached WINS_TO_WIN. Winner text fades in via CSS keyframe fadeIn. */}
      {phase === "over" && (() => {
        const displayP1 = p1Wins + (winner === 1 ? 1 : 0);
        const displayP2 = p2Wins + (winner === 2 ? 1 : 0);
        const setOver   = displayP1 >= WINS_TO_WIN || displayP2 >= WINS_TO_WIN;
        const setWinner = displayP1 >= WINS_TO_WIN ? 1 : 2;

        const overlayBase = {
          position: "absolute", inset: 0,
          background: "rgba(0,0,0,0.88)",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          animation: "fadeIn 0.35s ease-out both",
        };
        const btnBase = {
          padding: "11px 28px",
          color: "#fff", borderRadius: 2,
          fontSize: 11, fontWeight: 700, letterSpacing: 3,
          cursor: "pointer",
          fontFamily: "monospace",
        };

        if (!setOver) {
          // Match over -- set continues. Show score, offer REMATCH or MENU.
          return (
            <div style={overlayBase}>
              <div style={{
                fontSize: 30, fontWeight: 700, letterSpacing: 7,
                color: "#fff", marginBottom: 6,
                animation: "fadeIn 0.5s ease-out both",
              }}>
                {"P" + winner + " WINS"}
              </div>
              <div style={{
                fontSize: 11, letterSpacing: 3,
                color: "rgba(255,255,255,0.75)",
                marginBottom: 32,
                fontFamily: "monospace",
              }}>
                {displayP1} - {displayP2}
              </div>
              <div style={{display: "flex", gap: 12}}>
                <div
                  onPointerDown={() => handleRematch(winner)}
                  style={{...btnBase, background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.18)"}}
                >REMATCH</div>
                <div
                  onPointerDown={handleMenu}
                  style={{...btnBase, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.4)"}}
                >MENU</div>
              </div>
            </div>
          );
        } else {
          // Set over -- one player won the best-of-3.
          return (
            <div style={overlayBase}>
              <div style={{
                fontSize: 11, letterSpacing: 4,
                color: "rgba(255,255,255,0.60)",
                marginBottom: 10,
                fontFamily: "monospace",
                textTransform: "uppercase",
              }}>THE SET</div>
              <div style={{
                fontSize: 30, fontWeight: 700, letterSpacing: 7,
                color: "#fff", marginBottom: 6,
                animation: "fadeIn 0.5s ease-out both",
              }}>
                {"P" + setWinner + " WINS"}
              </div>
              <div style={{
                fontSize: 11, letterSpacing: 3,
                color: "rgba(255,255,255,0.75)",
                marginBottom: 36,
                fontFamily: "monospace",
              }}>
                {displayP1} - {displayP2}
              </div>
              <div style={{display: "flex", gap: 12}}>
                <div
                  onPointerDown={() => handlePlayAgain(setWinner)}
                  style={{...btnBase, background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.18)"}}
                >PLAY AGAIN</div>
                <div
                  onPointerDown={handleMenu}
                  style={{...btnBase, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.4)"}}
                >MENU</div>
              </div>
            </div>
          );
        }
      })()}

      {/* Settings overlay -- rendered on top of everything, accessible from
          any phase (start, playing-paused, over). When level changes, sync
          aiLevel into game state immediately so the running game reflects it. */}
      {showSettings && (
        <SettingsScreen
          settings={settings}
          initialSection={settingsSection}
          onUpdate={(key, val) => {
            updateSetting(key, val);
            if (key === "level") setState(s => ({ ...s, aiLevel: val }));
          }}
          onClose={closeSettings}
        />
      )}
    </div>
  );
}

// ============================================================
// FULLSCREEN WRAPPER
// Scales TetrisGame2P (402x874 native) to fit the viewport while
// preserving aspect ratio. Black letterboxing if aspect mismatch.
// ============================================================

function FullscreenGame() {
  const [scale, setScale] = useState(1);

  useEffect(() => {
    // Scale to fit HEIGHT -- the play area runs from the very top of
    // the viewport to the very bottom, so every row is on-screen and
    // playable. On devices wider than the 402:874 frame ratio (most
    // modern phones are within ~1% of it), this leaves a thin
    // horizontal letterbox that disappears into the matching #0a0a0a
    // body bg. Trade-off: vertical play space is always fully visible,
    // which is the priority for a Tetris-style game.
    const recalc = () => {
      const root = document.getElementById("root");
      const w = (root && root.clientWidth)  || window.innerWidth;
      const h = (root && root.clientHeight) || window.innerHeight;
      // Pick the smaller scale so the FULL frame always fits inside
      // the viewport; height almost always wins on phones.
      setScale(Math.min(w / FRAME_W, h / GAME_2P_H));
    };
    recalc();
    window.addEventListener("resize", recalc);
    window.addEventListener("orientationchange", recalc);
    return () => {
      window.removeEventListener("resize", recalc);
      window.removeEventListener("orientationchange", recalc);
    };
  }, []);

  // Block default touch behaviors (scroll, double-tap zoom, pull-to-refresh).
  useEffect(() => {
    const prevent = (e) => { e.preventDefault(); };
    document.addEventListener("touchmove", prevent, { passive: false });
    document.addEventListener("gesturestart", prevent, { passive: false });
    return () => {
      document.removeEventListener("touchmove", prevent);
      document.removeEventListener("gesturestart", prevent);
    };
  }, []);

  return (
    <div style={{
      transform: `scale(${scale})`,
      transformOrigin: "center center",
      width: FRAME_W,
      height: GAME_2P_H,
    }}>
      <TetrisGame2P />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FullscreenGame />);

// Tell Capacitor to hide the splash screen as soon as the JS bundle
// executes. Without this, Capacitor waits for launchShowDuration (1200ms)
// before auto-hiding. On web this is a no-op.
try { window.Capacitor?.Plugins?.SplashScreen?.hide(); } catch (_) {}
</script>
</body>
